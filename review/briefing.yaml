subprojects:
  language-pipeline:
    purpose: >
      The core compilation and evaluation stack. Parses .ri source files via Tree-sitter,
      type-checks with a 9-base-quantity dimensional analysis system, elaborates into an
      evaluation graph of 7 node types, and evaluates demand-driven with immutable
      HAMT-backed snapshots and content-hash early cutoff. This is the foundation —
      if this breaks, everything breaks. The crate layering (reify-core → reify-ast →
      reify-ir, with reify-syntax as the parser) is strict and machine-checked.

    key_scenarios:
      - "A .ri source file is parsed, compiled, and evaluated: param defaults propagate, let bindings compute in dependency order, constraints report satisfied/violated"
      - "Incremental re-evaluation after a parameter edit: dirty/demand cone intersection computes the minimal eval set, early cutoff skips unchanged nodes"
      - "Auto parameter resolution: two-phase eval (value eval → constraint solve → re-eval dependent let bindings) correctly resolves undetermined params"
      - "Structure-instance runtime: StructureName(field: value, …) ctors evaluate to a typed Value::StructureInstance carrying resolved cells — GR-001 DONE; Steel_AISI_1045() and the starter library evaluate at runtime"
      - "Purpose activation: dynamic constraint injection at runtime without recompilation, with correct reverse-index rebuild (reify check --purpose is on main)"
      - "Guard-controlled topology: when a guard cell's boolean changes, the active set of value cells and constraints changes (topology rebuild, not just value re-eval)"
      - "Multi-module compilation: import resolution via ModuleDag with topological ordering and cycle detection"
      - "Deferred-code pattern: a compiled IR node carries an unevaluated reify_ast::Expr by value (e.g. annotation args), materialized later — the only legal ir→ast reference"

    what_working_means:
      - "Parsing a valid .ri file produces a ParsedModule with no errors and correct source spans"
      - "Compiling produces TopologyTemplates with correct ValueCellId paths and compiled expression trees"
      - "Evaluating produces Value::Scalar with correct SI values and dimension vectors"
      - "Content hashes are stable across re-parses of identical source and differ after any change"
      - "edit_param triggers re-evaluation of only the dirty-demand intersection; unrelated nodes are cache hits"
      - "The crate DAG holds: cargo test passes the dag_invariant.rs tests and scripts/assert-crate-dag.sh reports B1–B6 clean"
      - "All tests pass: cargo test -p reify-core -p reify-ast -p reify-ir -p reify-syntax -p reify-compiler -p reify-expr -p reify-eval (NOTE: reify-types no longer exists)"

    key_decisions:
      - decision: "Three-layer crate split (reify-core / reify-ast / reify-ir) replacing the former monolithic reify-types, enforced by machine-checked DAG invariants"
        why: "Isolates blast radii (changing the AST no longer rebuilds value/geometry modules) and makes 'meaning never depends on surface syntax' a compile-time + test-time guarantee, not a convention. reify-ast = source as written (unresolved); reify-ir = compiled runtime (Value, geometry handles, solvers). The only legal back-edge is IR embedding an unevaluated reify_ast::Expr (deferred-code pattern). reify-syntax still carries a TRANSIENT `pub use reify_ast::*` re-export pending a test-import sweep — labeled for removal, not a permanent façade."

      - decision: "Custom incremental evaluation engine instead of Salsa"
        why: "Salsa was evaluated and rejected (see docs/research/salsa-fit-gap-analysis.md) — Reify's snapshot model, two-phase resolution, and topology-changing guards don't fit Salsa's memoization model"

      - decision: "Immutable snapshots via im-rs HAMT with O(1) clone"
        why: "Load-bearing for concurrent edit path. prepare_concurrent_edit relies on O(1) state handoff. NodeCache clone intentionally drops warm_state to avoid leaking solver state across snapshots."

      - decision: "Two-phase auto resolution (eval → solve → re-eval)"
        why: "Auto cells start as (Undef, Auto) and are never touched by the normal expression evaluator. The solver runs after the main eval wave, then a second propagation wave updates dependent let bindings. Reviewers expecting a single eval pass will be confused. NOTE: the eval/check CLI entry points attach no solver, so auto cells print Undef there."

      - decision: "Tree-sitter grammar compiled as C library linked at build time, with two-pass lowering"
        why: "First pass collects known_enums so the second pass can disambiguate Direction.In (enum access) from member access"

      - decision: "structure and occurrence compile to identical TopologyTemplate, differentiated only by EntityKind enum"
        why: "Semantics differ (thing-that-exists vs process/transformation) but the evaluation engine treats both identically. Ports, connections, and chain declarations work on both."

      - decision: "Trait conformance is nominal, not structural"
        why: "Reify's anti-thesis is 'physical/mechanical nonsense should be hard to encode'. structure_def : TraitName declarations are the explicit locus of author intent. Structural admission would silently equate physically-distinct shapes with coincident cell names (e.g. ShellStress / LaminateStress). Reviewers familiar with TypeScript/Go structural typing should not flag this as a missing feature."

    known_gaps:
      - what: "stdlib-reference completion is mid-flight: ~48% of 544 documented symbols implemented, ~130 tracked gaps across the v0_6 PRD batch"
        why: "Systematic push driven by the stdlib-reference gap register (2026-06-01). Bucket B gaps are doc-reconcile (code intentionally diverged — fix the doc); Bucket C are phantom-dones (315/316/323 confirmed). Reviewers should expect documented-but-unimplemented symbols and treat them as tracked, not as bugs, unless they find a NEW phantom-done."
        tracking: "stdlib-reference-gap-register-2026-06-01.md; v0_6 PRD batch"

    exclude:
      - ".worktrees/ — orchestrator working copies (symlinked to data_lv_1), not reviewed"
      - ".eval-worktrees/ — eval framework working copies, not reviewed"
      - "tree-sitter-reify/src/ — generated C parser output"
      - "target/ — build artifacts (symlinked to data_lv_1)"

  constraints-and-geometry:
    purpose: >
      Constraint solving and geometry generation across a multi-kernel architecture.
      The constraint system routes auto-parameter resolution through domain-specific
      solvers (Nelder-Mead for dimensional, SolveSpace for geometric, pure-Rust
      backtracking for logical). The geometry layer dispatches compiled GeometryOps
      across five kernels (OCCT, Manifold, Fidget, OpenVDB, Gmsh) via a capability-
      descriptor dispatcher with BFS conversion-chain routing. The stdlib provides
      dimension-aware math builtins, geometric value constructors, and (growing) the
      declarative engineering surface — tolerancing/GD&T, DFM, stackup, fields.

    key_scenarios:
      - "Auto params are solved: ResolutionProblem → decompose into independent components via union-find → route each to domain-specific solver → merge results"
      - "Geometry primitive (box/cylinder/sphere/tube) evaluates through the dispatcher → selected kernel → kernel-specific FFI → shape stored by handle ID"
      - "Boolean operations cross kernels: a Manifold-only mesh boolean can run on OCCT-produced shapes via auto-tessellation, with the dispatcher BFSing the conversion chain"
      - "Geometry refinement traits: a 2D profile vs a solid is distinguished by inferred marker traits + a computed dimension enum, not by distinct value-types; GeometryProfileRequired diagnostics fire on use-site mismatch"
      - "Transform/frame surface: plane_*/axis_* constructors (in reify-stdlib), ApplyTransform, mirror/circular_pattern over the geometry handle"
      - "STEP/STL export serializes the final shape (OCCT-owned)"
      - "Stdlib trig functions enforce ANGLE dimension — sin(5mm) returns Undef"
      - "Declarative engineering libs evaluate: tolerancing/GD&T constraint-defs, DFM rules (incl. one geometry-backed fits_build_volume over BoundingBox), stackup — all as constraint-defs over design-declared/measured values"

    what_working_means:
      - "Constraint solving converges for dimensional problems (Nelder-Mead, feasibility < 1e-12)"
      - "SolveSpace recognizes pattern-matched constraints (distance, angle, parallel, perpendicular, coincident)"
      - "OCCT primitives, booleans, transforms, and export all produce valid output"
      - "Manifold mesh-Boolean operations produce valid output on tessellated inputs"
      - "Fidget JIT evaluates SDF primitives and Boolean ops"
      - "Cross-kernel dispatch finds a valid plan when one exists; fails cleanly when no conversion chain reaches the demanded ReprKind"
      - "All stdlib builtins return correct values with correct dimensions; wrong-dimension inputs return Undef"
      - "Novel declarative syntax (new tolerancing/DFM/field constructors) compiles and checks via the real `reify check` binary"
      - "All tests pass: cargo test -p reify-constraints reify-geometry reify-kernel-occt reify-kernel-manifold reify-kernel-fidget reify-kernel-openvdb reify-kernel-gmsh reify-stdlib"

    key_decisions:
      - decision: "Geometry refinement = marker traits on one Type::Geometry, not Solid/Surface/Curve value-types"
        why: "Composes 2D∧Closed∧Planar without a 2^N type explosion; reject-only-statically-known-mismatch keeps it permissive. plane_*/axis_* constructors live in reify-stdlib eval_builtin — a survey grepping only compiler/eval will falsely report them missing. (decisions_geometry_traits_not_types)"

      - decision: "Multi-kernel architecture with capability descriptors and BFS conversion-chain dispatch"
        why: "OCCT alone cannot serve every geometry op (mesh booleans, SDF JIT, voxel ops, FEA-grade meshing all need different backends). Each kernel registers a CapabilityDescriptor via inventory::submit! at startup; the dispatcher (reify-eval/src/dispatcher.rs) BFSes the conversion graph. Routing to Manifold is DEMANDED-REPR (Mesh sink), NOT OCCT-failure — boolean_fuse on valid overlapping primitives succeeds on OCCT. The production CLI only force-links OCCT; kernel-provenance is observable on `build --verbose`, not on `check`."

      - decision: "CpSatSolver is pure-Rust backtracking, NOT backed by Google OR-Tools despite the name"
        why: "Named CpSatSolver for spec alignment. Pure Rust is sufficient for v0.1 problem sizes (integer domains capped at 1000 values). SolverRegistry is designed for real OR-Tools substitution later."

      - decision: "SolveSpace libslvs has a global Mutex serializing all Slvs_Solve calls"
        why: "libslvs has global internal state. A hard compile_error fires if slvs is not found but solvespace.rs is compiled."

      - decision: "Geometry values (Point, Vector, Frame) in stdlib are mathematical objects separate from kernel-owned shapes referenced by opaque GeometryHandleId"
        why: "Two levels that never mix directly: Value::Frame is a first-class runtime value for constraint math; GeometryHandleId(3) is a pointer into the kernel's shape store."

      - decision: "Each kernel detected at build time with transparent stub fallback"
        why: "If kernel headers/libs are absent (OCCT, Gmsh, OpenVDB), the crate compiles to stubs returning errors. *_AVAILABLE bools let downstream code skip tests at runtime. Headless / partial-deps environments work."

    known_gaps:
      - what: "OpenVDB Imported-field consumer arm in elaborate_field returns Value::Undef (reify-eval does not depend on reify-kernel-openvdb)"
        why: "GR-003 — still FICTION. Ownership resolved to multi-kernel (task θ replaces the Value::Undef at engine_eval.rs with a reify-kernel-openvdb::ingest consumer)."
        tracking: "GR-003 / task 3439 (pending)"

      - what: "Manifold→MeshGL64 attribute/provenance egress and full manifold routing through reify-eval"
        why: "manifold-csg 0.3 added to_meshgl64 egress (substrate task 4247 landed), but the consumer path has deeper blockers: non-deterministic facet handles, per-triangle face model, no manifold routing in reify-eval (KernelAttributeHook is OCCT-shaped). Re-scoped to a kernel-level walk + correlation test."
        tracking: "tasks 3525 / 4262 / 4263 / 3437 (blocked) / 3437-owned engine-test gate"

      - what: "Multi-kernel Phase-3 consumer wiring (OpenVDB voxel-Boolean FFI stubbed; Fidget SDF→Mesh tessellation; CLI kernel-provenance surfacing)"
        why: "Producer infrastructure exists with kernel-level stub fallback. CLI `build --verbose kernel:<id>` provenance + prod terminal-kernel API owned by task 4248."
        tracking: "multi-kernel-phase-3 DAG (3432–3448); 4248"

    exclude:
      - "docs/research/ — background research, not application code"

  kinematics:
    purpose: >
      Mechanism modelling and forward/closed-chain kinematics, implemented entirely as
      stdlib (no new engine node kinds). Users compose joints (prismatic, revolute,
      cylindrical, planar, spherical, fixed, coupling) into a mechanism via a fluent
      builder, then take pose snapshots at joint configurations or sweep a joint
      across a range with warm-start across steps. Closed chains are solved by
      Gauss-Newton iteration on SE(3) residuals. This is the foundation the
      motion/trajectory subproject builds on.

    key_scenarios:
      - "User writes mechanism().body(...).body(...) joining bodies with joints; snapshot(mech, bindings) returns a pose Map"
      - "sweep(mech, joint, range, steps) walks a joint over a range, warm-starting closed-chain free variables from the previous step"
      - "Closed chains (loops) are solved per loop with Gauss-Newton on SE(3) residuals; convergence reported in the snapshot Map"
      - "Forward kinematics for open chains: tree-walk from world along the mechanism spanning tree"

    what_working_means:
      - "Open chains with prismatic + revolute + coupling + fixed joints produce correct snapshot poses"
      - "Single-DOF closed chains converge under Gauss-Newton iteration"
      - "sweep warm-starts free variables correctly across consecutive steps"
      - "Joint Jacobian columns are correct for the wired joint kinds"

    key_decisions:
      - decision: "Kinematics is self-contained in stdlib; no new engine eval kinds, no new constraint solver integration"
        why: "Per the PRD's 'minimal core, rich libraries' principle. The closed-chain solver (loop_closure_solver.rs) is its own pure-Rust Gauss-Newton implementation rather than going through SolveSpace. Reviewers may expect a constraint-solver hookup; there is none."

      - decision: "Bare Gauss-Newton (no Levenberg-Marquardt damping or line search) for loop closure"
        why: "Acceptable for v0.1 per kinematic-constraints PRD. Damping is a future improvement; the current solver works for low-DOF mechanisms."

      - decision: "Multi-DOF joints (planar, spherical, cylindrical) are split from closed-chain solving"
        why: "Their analytic Jacobians are future work; current implementation provides standalone open-chain transforms only. Closed-chain solver's f64-per-joint signature cannot vectorize multi-DOF joints. Per task 2670 (done) decision; the deferral itself stands."

      - decision: "No inverse kinematics in v0.1"
        why: "Explicit out-of-scope per kinematic-constraints PRD; future feature with its own PRD. Motion/trajectory waypoints are joint-space-only for the same reason."

    known_gaps:
      - what: "Multi-DOF joints (planar, spherical, cylindrical) cannot appear in loop-closure chains"
        why: "Analytic Jacobians not yet implemented; current fallback returns zero placeholders. Affects only mechanisms with closed loops AND multi-DOF joints — a narrow combination."
        tracking: "kinematic-constraints PRD follow-ups; see gap-register"

      - what: "Singularity / overconstrained / underconstrained diagnostics reserved but not wired into snapshot/sweep"
        why: "Diagnostic wrapper exists and is unit-tested, but pre-check on 6 residuals is too strict for low-DOF fixtures. Snapshot Map currently lacks the is_singular flag the PRD promised."
        tracking: "kinematic-constraints PRD follow-ups; see gap-register"

    exclude: []

  motion-trajectory:
    purpose: >
      Design-time motion analysis for high-performance FDM printers (and similar
      gantry mechanisms). A user authors a joint-space motion profile parametrically
      (or imports real slicer G-code), applies input shaping — classical ZV/ZVD/EI or
      optimization-driven time-optimal TOTS — against a modal model of the mechanism's
      structural vibration, and reads off predicted end-effector trajectory error.
      The reify-gcode crate is the low-level value-typed, dialect-shared G-code parser
      this subproject consumes; it is not a standalone thing.

    key_scenarios:
      - "Parametric shaper design (no G-code): author a piecewise-cubic motion profile, apply a ZV/ZVD shaper tuned to the printer's modal frequency, simulate_trajectory, read peak end-effector vibration deviation; iterate"
      - "Time-optimal motion (TOTS): supply velocity/accel/force limits + a vibration tolerance; an in-house SQP loop reshapes B-spline control points + duration to a minimum-time feasible solution"
      - "Slicer ingestion: gcode_import(file, dialect: KlipperDialect | MarlinDialect) returns a List<MotionProfile>; the first segment feeds simulate_trajectory"
      - "A Klipper INPUT_SHAPER directive emits W_GcodeDialectShaperConflict (a warning), not a parse error"

    what_working_means:
      - "Pure-.ri fixtures pass: ZV-shaped ramp (≥40 dB residual reduction), ZVD ±10% / EI ±15% frequency-robustness, TOTS point-to-point convergence (≤100 iters, duration < baseline, vibration constraint met)"
      - "A 100-line Marlin G-code fixture imports to a non-empty List<MotionProfile> with no parse errors; forward-simulating the first segment completes without diagnostics"
      - "G-code round-trips losslessly: parse → display → parse == parse"
      - "ComputeNode cache: a second simulate_trajectory with identical (profile, mech, modal) hits cache; a control-point change invalidates it"
      - "All tests pass: cargo test -p reify-gcode; cargo test -p reify-eval --test trajectory_e2e"

    key_decisions:
      - decision: "G-code parser is value-typed and dialect-shared — one semantic GcodeCommand enum for Marlin + Klipper"
        why: "Variants are semantic (LinearMove, ArcMove) not literal G-code numbers; Klipper directives append as variants. Gives lossless round-trip + a single AST→MotionProfile lowering path. The enum grows with each dialect, bounded by the reify-gcode crate."

      - decision: "G-code is an optional bolt-on, not the primary authoring surface"
        why: "The PRD is fully usable without G-code; CI acceptance runs pure-.ri fixtures only. G-code import is a separable Phase-5 piece. Reviewers should not treat the G-code arm as core-path."

      - decision: "Impulse shaping uses classical closed-form convolution (ZV/ZVD/EI), not numeric resampling; TOTS uses an in-house SQP (not an external optimizer)"
        why: "Singer-Seering/Singhose textbook formulas; pure-Rust f64 below the Value marshalling boundary. TOTS avoids a heavy v0.3 dependency (faer LU for the QP sub-problem); swapping in osqp/argmin is a post-dogfood open question (PRD §12.1)."

      - decision: "Joint-space waypoints only in v0.3 (no Cartesian IK)"
        why: "Cartesian + inverse kinematics depends on the kinematic-constraints PRD; bookmarked as a follow-up."

    known_gaps:
      - what: "simulate_trajectory and the spline-intrinsic / input_shape Value wiring are staged: the pure-Rust cores are implemented but several eval-boundary arms return Value::Undef or echo the input profile verbatim"
        why: "Intentional vertical-slice staging. simulate_trajectory_core (FK + inverse dynamics + modal superposition) is fully implemented in reify-stdlib but not yet wired to the eval dispatch (downstream π/θ trampoline tasks); evaluate_profile/profile_duration and command-waveform resampling depend on Profile↔spline Value marshalling. A reviewer unfamiliar with the staging would read these as no-ops/bugs — the comments mark them as type-correct stand-ins."
        tracking: "trajectory-input-shaping PRD (docs/prds/v0_3/) Phase 1 β + tasks θ/π; depends on rigid-body-dynamics + modal-analysis PRDs and SIR-α (3540, done)"

      - what: "Additional G-code dialects (Smoothie/RepRap/Mach3), Cartesian waypoints, multi-mechanism bundles, pose-parametric modal models, and online/real-time replanning"
        why: "v0.3 ships Marlin + Klipper, joint-space, single-mechanism, design-time only. Online replanning is permanently out of scope (Reify is design-time)."
        tracking: "trajectory-input-shaping PRD §8/§12 (future PRD slots)"

    exclude: []

  analysis:
    purpose: >
      Structural-analysis stack — finite-element solvers, mesh morphing for shape
      updates, shell-mid-surface extraction from thin solids, and FDM as-printed FEA
      (deriving spatially-varying anisotropic material fields from print parameters).
      The substrate that gated end-to-end FEA (GR-001 structure-instance runtime,
      GR-002 ComputeNode @optimized dispatch vertical slice) has now landed, but
      whether a real .ri file gets back usable, sampleable results end-to-end is
      UNVERIFIED — see known_gaps. This is exactly the kind of "the tasks are done but
      does it actually work?" question /review should probe hands-on.

    key_scenarios:
      - "An .ri file declares loads and supports on a structure; solve_elastic_static evaluates as a ComputeNode and returns a stress/displacement field that downstream code can sample"
      - "Mesh morph: under a shape-parameter edit the existing mesh is deformed via linear-elasticity FEM rather than remeshed from scratch (eligibility classifier picks Laplacian / elasticity-morph / remesh-fallback)"
      - "Shell extraction: a thin solid is reduced to a shell mid-surface via voxel medial-axis detection, then meshed for shell FEM"
      - "FDM as-printed FEA: FDMProcess(build_direction, layer_height, walls, infill_density, …) → as_printed_material(body, proc) returns a Field<Point3, AnisotropicMaterial> (wall zones near-bulk, infill knocked down by Gibson-Ashby, build-Z weaker); FEA on this field shows more deflection and a visibly weaker build direction than homogeneous-solid FEA"
      - "FDM progressive refinement: the R-fast (geometric zone) result refines automatically toward R0 (real PrusaSlicer toolpath) when the slicer is on PATH, with FEA warm-starting across the fidelity bump"

    what_working_means:
      - "reify-solver-elastic reference-element kernels produce correct shape functions, Jacobians, and stiffness contributions for P1/P2 tets and P1 hex/wedge"
      - "Conjugate-gradient linear solver converges on synthetic stiffness systems"
      - "Mesh-morph eligibility classifier correctly chooses between Laplacian / elasticity / remesh paths; the elasticity path meets the calibrated quality floor (quality_floor_pct_below_025 = 0.01)"
      - "Shell-extract voxel medial-axis detector returns the expected mid-surface for the canonical thin-plate fixture"
      - "FDM R-fast: an as-printed bracket shows max_deflection strictly greater than the homogeneous-solid case, build-Z visibly weaker (golden test); R0 slicer path is byte-deterministic and cancels cleanly with no orphan process"
      - "End-to-end probe (UNVERIFIED, worth /review attention): does a real .ri FEA file return a sampleable result, or do result Values still read Undef at the sample boundary?"
      - "All tests pass: cargo test -p reify-solver-elastic reify-mesh-morph reify-shell-extract reify-fdm"

    key_decisions:
      - decision: "FEA accuracy bounds must be honest about the element-formulation floor AND the reference's own inaccuracy"
        why: "Two recurring failure modes: (1) the in-scope element formulation can't reach the promised accuracy (P1-tet bending-lock ~6.8%; membrane-lock needs ANS; modal f∝√K) — relax to a reachable bound and move aspiration to a more-capable follow-up; (2) the analytical reference is itself off (1-D Timoshenko ~2% from 3-D at stocky L/H=2). Survey: docs/architecture-audit/fea-accuracy-achievability-survey-2026-05-29.md. Single-node point-load deflection is mesh-DIVERGENT — use distributed end-shear + face-averaged deflection."

      - decision: "FDM as-printed uses a progressive fidelity ladder (R-fast → R0 → R1 → R2 → R3), not a user-selected fidelity dial"
        why: "as_printed_material emits the cheapest rung (R-fast: geometric zone classification, no slicer) immediately and refines as compute allows; downstream FEA warm-starts because the field domain (mesh) stays fixed. #deterministic pins one rung. R1–R3 (mesostructure / RVE homogenization / transient thermal) are deferred to sibling stub PRDs."

      - decision: "reify-fdm is intentionally dependency-free; PrusaSlicer integrated as a subprocess (never FFI)"
        why: "The R-fast zone classifier + correlation library have zero external deps and an analytic AxisAlignedBox helper for pure-Rust testability (real-body OCCT distance queries owned by a downstream task). Subprocess slicing keeps AGPL at a clean license boundary; per-bead geometry recovered from G-code comments."

      - decision: "Mesh-morph quality-floor defaults are calibrated against synthetic fixtures and locked in production"
        why: "quality_floor_pct_below_025 = 0.01 was tuned in the calibration sweep harness (box, plate_with_hole, bracket). Changing it without re-running the sweep is a silent regression risk."

      - decision: "Shell extraction uses a tolerant 'empty OR centered' per-voxel medial test on even-N grids"
        why: "Even-N grid + point-medial geometry (sphere) cannot be tested by a single radius (abs_diff = 2|V| ≥ 1.732 > threshold ≤ 1.5). Reviewers may flag the tolerance as imprecise; it is the deliberate fix."

    known_gaps:
      - what: "FEA end-to-end user reachability is UNVERIFIED. The substrate landed (GR-001 done; GR-002 ComputeNode vertical slice η=3426 done) but FEA result Values may not fully populate sampleable fields"
        why: "Root cause identified in the 2026-05-30 premise review: ElasticResult.{stress,displacement,frame} and modal Mode.shape Φ were Undef at the result boundary, so downstream samplers inherit a false premise. The FEA result-model PRD chain (field population, VonMises-max, GUI dispatch, realized-mesh consumer) was filed to close this. Current status needs hands-on validation — try a real .ri FEA file and see what samples back."
        tracking: "FEA result-model PRD (docs/prds/v0_4/fea-result-model.md), batch ~4084–4094; premise review .orchestrator-scratch/v0_6-premise-review-report-2026-05-30.md"

      - what: "Shell-extract beyond T1 (medial-axis detector): T2 mesh extraction, T3 branch pruning, T4 region segmentation"
        why: "Phased per the shells PRD; T1 ships first because it's the foundation."
        tracking: "structural-analysis-shells PRD (docs/prds/v0_4/)"

      - what: "FDM as-printed FEA beyond R-fast slice 1: R0 slicer-toolpath (FDMSlice/FDMPrint occurrences, Toolpath type, slicer subprocess wiring), R1–R3 fidelity rungs, GUI zone/contour visualization"
        why: "Sliced delivery — R-fast lands first (no slicer dep); R0+ rungs and GUI viz follow. R1–R3 held by sibling stub PRDs."
        tracking: "fdm-as-printed-fea PRD (docs/prds/v0_5/) slice 2; fdm-print-{mesostructure-r1,rve-homogenization-r2,thermal-bondsag-r3}.md"

    exclude: []

  runtime:
    purpose: >
      Async evaluation scheduler on top of reify-eval. Fans independent evaluation nodes
      across Tokio thread pool by topological level, manages warm-start state pools for
      stateful solvers, and provides cooperative cancellation and priority promotion
      infrastructure. The sequential path is fully wired; the concurrent path works
      end-to-end but advanced scheduling policies are not yet integrated.

    key_scenarios:
      - "ConcurrentScheduler groups dirty nodes by topological level, spawns all nodes within a level as tokio tasks, waits for level completion before advancing"
      - "WarmStatePool budgets memory for solver warm-start states with LRU eviction"
      - "Cooperative cancellation checks at level boundaries (not mid-level)"
      - "Resolution (NLopt) runs sequentially after concurrent value evaluation — architecturally correct since NLopt is single-threaded"

    what_working_means:
      - "SequentialScheduler produces correct eval results for the bracket fixture"
      - "ConcurrentScheduler produces identical results to sequential for the same inputs"
      - "WarmStatePool evicts LRU items when budget exceeded; oversized single items still accepted"
      - "Cancellation at level boundary stops further evaluation"
      - "All tests pass: cargo test -p reify-runtime"

    key_decisions:
      - decision: "std::sync::RwLock in ConcurrentEvalAdapter, not tokio::sync::RwLock"
        why: "Expression eval is CPU-bound microseconds. Locks never held across .await. Using tokio locks would add unnecessary overhead."

      - decision: "Oversized warm-start items stored unconditionally when pool is empty"
        why: "Over-budget by one item is acceptable. A single giant solver state is more valuable than budget purity."

      - decision: "Priority ordered by enum declaration (lower discriminant = higher priority) via derived Ord"
        why: "P0Interactive < P1Fast < P1Slow < P3Speculative. min_by_key treats smaller = better. Promotions use new_priority < *current."

      - decision: "Lock poisoning recovered everywhere with unwrap_or_else(|e| e.into_inner())"
        why: "A panicked worker thread should not cascade failures to the scheduler thread via Mutex poisoning."

    known_gaps:
      - what: "WarmStatePool::drain_events is not yet wired to its consumer"
        why: "Tracked from a /review session 2026-05-14; not yet landed."
        tracking: "task 3582 (pending)"

    exclude: []

  tooling:
    purpose: >
      User-facing tools: an LSP server for editor integration, an MCP server for LLM access,
      a CLI binary that ties everything together, and a project-manifest crate (reify.toml).
      The LSP provides diagnostics, hover, go-to-def, document symbols, and completions.
      The MCP exposes read/write/navigation/reference tools plus a language-reference lookup.
      The CLI dispatches check, build, eval, lsp, gui, mcp-server, and doc subcommands.

    key_scenarios:
      - "Engineer editing .ri files gets live diagnostics, hover info, document-symbol outline, and completions via LSP"
      - "LLM reads/modifies .ri designs via MCP tools — get_parameters, set_parameter, update_source with immediate diagnostic feedback"
      - "LLM uses the language-reference MCP tool to look up DSL syntax before generating code"
      - "CLI check command validates constraints and exits non-zero on violations (CI-suitable); check is constraint-only and rejects unknown flags"
      - "CLI build command produces STEP/STL files via full OCCT pipeline; build realizes geometry and surfaces kernel provenance (--verbose)"
      - "reify.toml project pin (reify-config) parses + validates the project manifest, including the kernel pin"
      - "LSP embeddable in-process via InProcessLsp for the Tauri GUI (no stdio overhead)"

    what_working_means:
      - "reify check exits 0 for satisfied constraints, non-zero for violations"
      - "reify build produces non-empty STEP files"
      - "LSP reports diagnostics with correct source spans; document-symbol returns a nested outline (structure→members, enum→variants, fn leaves)"
      - "MCP tools/list returns the advertised tool set; set_parameter updates values visible in subsequent get_parameters"
      - "reify-config rejects a malformed reify.toml with a clear diagnostic"
      - "All tests pass: cargo test -p reify-lsp reify-mcp reify-cli reify-config"

    key_decisions:
      - decision: "MCP tool errors use isError:true in result body, not JSON-RPC error field"
        why: "MCP protocol spec requires tool-level errors as result content, not top-level errors. JSON-RPC error field is only for protocol failures."

      - decision: "CliToolContext does not support geometry export — reify_export MCP tool always errors in headless mode"
        why: "Export requires the geometry kernel, which is only initialized in the build command, not in the MCP context. The tool exists for the GUI's MCP context."

      - decision: "NotificationSink trait decouples diagnostic publication from transport"
        why: "Enables the same LSP server to run on stdio (ClientSink), embedded in Tauri (TauriNotificationSink), or in tests (RecordingSink)"

      - decision: "Language-reference topics compiled into the MCP binary via include_str!()"
        why: "LLM-readable reference so models can look up syntax before generating .ri code. Markdown files in src/tools/chunks/."

      - decision: "reify-config (reify.toml) is intentionally self-contained — no other workspace crate consumes its schema yet"
        why: "Owns the multi-kernel 'project pin' schema. Decoupled so the manifest format can stabilize independently of the consumers that will read it."

    known_gaps: []

    exclude:
      - "crates/reify-mcp/src/tools/chunks/ — static markdown reference content, not logic"

  doc-tooling:
    purpose: >
      Documentation generation for Reify modules: a doc-model library (reify-doc) plus
      the build CLI (reify-doc-build) that generates Markdown / HTML / JSON reference
      docs from compiled module metadata (doc comments, parameter tables, port tables,
      constraints, meta blocks, trait bounds). Faithful, non-editorialized human-readable
      reference output.

    key_scenarios:
      - "User runs reify doc <file>.ri and gets a Markdown / HTML / JSON file describing every public structure / fn / trait / constraint with their resolved types and unit dimensions"
      - "Doc-comment propagation: triple-slash /// comments survive parse → compile → doc-model and emit verbatim into the output"
      - "PRD §meta block rendering is alphabetic-key-sorted for deterministic output"

    what_working_means:
      - "reify doc on examples/m5_geometry.ri produces a non-empty document containing every declared parameter and constraint"
      - "Doc model deterministic across re-runs on identical source"
      - "All tests pass: cargo test -p reify-doc reify-doc-build"

    key_decisions:
      - decision: "Doc-build is non-interactive and non-editorial — no synthesized prose, only structured extraction"
        why: "v0.1 scope is faithful reference output. Editorialized prose, search/theming/version-diff are explicit v0.2+ deferrals."

      - decision: "PRD §meta block rendering uses alphabetic-key sort"
        why: "Deterministic output guarantee. Reviewers may expect source-order; alphabetic is the documented contract."

    known_gaps: []

    exclude: []

  gui:
    purpose: >
      Tauri 2 desktop application with SolidJS frontend. Provides a live Three.js 3D viewport,
      CodeMirror 6 code editor with in-process LSP and IDE affordances (diagnostics, hover,
      goto-def, document-symbol outline, cross-pane sync), a property editor for parametric
      values, a constraint status panel, and a Claude Code chat panel backed by a Node.js
      sidecar that runs the Claude Code SDK as a landlock-sandboxed subprocess.
      Source-to-viewport and viewport-to-source bidirectional navigation is implemented.

    key_scenarios:
      - "Opening a .ri file shows source in the editor and tessellated geometry in the viewport"
      - "Editing source triggers re-evaluation; viewport mesh updates via incremental delta events"
      - "Editing a value in the property editor triggers constraint re-check and viewport update"
      - "Clicking a mesh in the viewport scrolls the editor to the corresponding source location; double-clicking a property group header flies the camera to that entity"
      - "CodeMirror editor: syntax highlighting via custom Lezer grammar, LSP diagnostics merged with compile diagnostics, completions, hover, goto-def, document-symbol outline"
      - "Claude chat panel drives the sidecar (Claude Code SDK subprocess, --resume continuity); the subprocess is FS-sandboxed via vendored landlock helpers"
      - "screenshot_window debug-MCP tool captures the current viewport for offline inspection (REIFY_DEBUG=1 listener on :3939)"

    what_working_means:
      - "Tauri app launches and shows app-layout (not stuck on loading spinner)"
      - "Opening a .ri file renders geometry in the viewport and source in the editor"
      - "Status bar shows idle phase, nonzero triangle count, and constraint counts"
      - "Editing source shows 'Evaluating...' spinner then updated mesh"
      - "Property editor changes propagate to constraints and viewport"
      - "Bidirectional navigation works: viewport click → editor scroll, property double-click → camera fly-to"
      - "Unit tests pass: npm test (vitest). NOTE: gui-only Rust (--features gui) is NOT covered by the default verify.sh — gate gui-only Rust tests behind #[cfg(feature=gui)] and test manually with LD_LIBRARY_PATH set"

    key_decisions:
      - decision: "SolidJS (not React) for the frontend"
        why: "Fine-grained reactivity without virtual DOM. Store updates via produce() for surgical state mutations. Reviewers familiar with React will see different patterns."

      - decision: "Tauri 2 + Three.js (Option B from PRD) instead of pure wgpu+egui"
        why: "Fastest path to alpha. Three.js provides orbit controls, lighting, raycasting out of the box. Web tech excels at data-dense panels. IPC overhead is bounded (mesh deltas, not full state)."

      - decision: "In-process LSP via InProcessLsp bridge instead of stdio"
        why: "Avoids IPC overhead for the built-in editor. _keepalive field exists to keep the tower-lsp Client sender channel alive."

      - decision: "Node.js sidecar for Claude Code integration, sandboxed with vendored landlock helpers (not bwrap)"
        why: "Claude Code SDK runs as a subprocess (claude --print --output-format stream-json, --resume for continuity). bwrap is broken on this kernel (Bun + kernel 6.17 uid-map segfault); landlock sidesteps user namespaces. Landlock is FS-write-only — it bounds writes, not reads/network. /tmp is granted wholesale (accepted v1 limitation). Helpers vendored verbatim from dark-factory; see CLAUDE.md refresh procedure."

      - decision: "Delta-based IPC for engine state updates (mesh-update, value-update, etc.)"
        why: "compute_delta diffs against last_state and emits per-item events. Avoids sending full state on every edit."

      - decision: "Auto-rendered XYZ axis triad in the viewport"
        why: "The triad is a viewport affordance, not a model feature. Do NOT add an axis triad to .ri models."

    known_gaps: []

    exclude:
      - "gui/node_modules/ — third-party dependencies"
      - "gui/sidecar/node_modules/ — sidecar dependencies"
      - "gui/src-tauri/sandbox/ — vendored verbatim from dark-factory (refresh, don't edit in place)"
