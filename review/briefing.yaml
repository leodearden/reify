# Review briefing — contextualises /review runs with durable project truths.
# Auto-generated by /review-briefing. Human edits preserved on update.
# Last updated: 2026-05-16T00:00:00Z

project: reify

# Conventions and rules with teeth — violations are always bugs.
conventions:
  - rule: "No latent untracked incomplete or ill-formed implementation chains may accumulate. Every public producer must have a real production consumer, OR a `// G-allow: <reason citing tracked task>` marker on the line directly above `pub fn`, OR be removed. Cross-PRD seams must have a named owner."
    why: "The 2026-05-12 architecture audit found ~19 of 44 mechanism clusters fit this 'scaffold without a caller' shape (producer side built, no production consumer). The remediation has been explicitly painful and is the dominant Reify-specific failure mode. New PRDs prevent re-introduction via the /prd skill's gates G1–G5+META; corpus-wide detection is via scripts/audit-orphan-producers.sh (baseline at docs/architecture-audit/g-tool-baseline-report.md). Reviewers should treat any new producer-orphan as a high-priority finding."

  - rule: "All new PRDs go through the /prd skill (.claude/skills/prd/) — never freehand-author a PRD or queue tasks from one"
    why: "The skill walks audit-derived gates that prevent the failure modes the audit surfaced: G1 (consumer named), G2 (user-observable leaf signal), G3 (grammar verified via tree-sitter), G4 (cross-PRD seam ownership), G5 (design-first contracts when stakes are high), META (would the PRD produce a complete/coherent/cohesive/good design under decompose-and-queue without further oversight?). Decompose mode files via fused-memory submit_task with planning_mode=True and bulk-flips deferred→pending after wiring all dependencies."

  - rule: "Errors must be noisy — never silently swallow logic errors with unwrap_or(Value::Undef), unwrap_or(0.0), unwrap_or(Type::Real), or similar default-on-error patterns"
    why: "Strong team norm. Silent defaults mask bugs. The only acceptable exception is sanitize_value converting NaN/Inf to Undef at the stdlib boundary. Any other exception must be scrutinized closely and discussed in depth."

  - rule: "All task operations route through fused-memory MCP tools, never Taskmaster CLI or MCP directly"
    why: "Taskmaster was removed entirely 2026-05-12. fused-memory is the only task interface; never inspect or commit tasks.json or tasks.db. TaskInterceptor must see every state transition to trigger reconciliation events."

  - rule: "OCCT kernel operations must run on the dedicated std::thread via OcctKernelHandle actor pattern — never directly from async context"
    why: "OCCT uses process-global state (memory allocators, shape naming tables, exception state). OcctKernel is !Send+!Sync. Sync trait methods panic if called from async context; use _async variants instead."

  - rule: "Gmsh kernel operations must hold init::GMSH_LOCK for any libgmsh call"
    why: "libgmsh is process-globally non-thread-safe. Tests acquire the lock before touching the library. Multi-kernel dispatch must serialize on this lock when routing to the Gmsh kernel."

  - rule: "Angle (radian) is a genuine physical dimension (DimensionVector index 7), not dimensionless"
    why: "Engineering-motivated. sin(5mm) must return Undef, not a number. Trig functions require ANGLE dimension or bare Real. This is unusual vs. most physics libraries and reviewers will question it."

  - rule: "DimensionVector uses Rational with i16/i16 exponents, not i8"
    why: "Multiplication of dimension exponents (e.g. in cross product, sqrt) can overflow i8 range (i8*i8 max = 16129 < i16::MAX)"

  - rule: "SI base units are canonical — all Value::Scalar si_value fields are in metres, kilograms, seconds, radians"
    why: "Unit conversions happen once at compile time (unit_to_scalar in reify-compiler). Mixing converted and unconverted values is a class of bug."

  - rule: "Value::Undef propagates through all arithmetic as quiet-NaN semantics — division by zero produces Undef, not panic"
    why: "Constraint checker treats Undef inputs as Indeterminate rather than Violated. Panicking on undetermined values would crash the incremental engine mid-evaluation."

  - rule: "Quality is king — deal with real technical debt ruthlessly. Issues may dangle briefly only if there is a task in the queue that will resolve them and the debt won't compound in the meantime."
    why: "Strong team norm. No gaps should exist without tasks to fill them."

  - rule: "Structure constructors are PascalCase (Steel_AISI_1045, FixedSupport, LoadCase). Do not introduce snake_case ctor names for new structures."
    why: "GR-001 resolution (2026-05-12): the historical snake_case/PascalCase split (point_load vs FixedSupport) collapses on PascalCase as struct-instance runtime lands. Existing snake_case builtins are being rewritten as stdlib structure_defs. New code should not re-introduce the split."

  - rule: "libslvs (SolveSpace) is essential for v0.1, not optional"
    why: "Geometric constraint solving falls back to Nelder-Mead penalty functions without it, which is less efficient and less reliable for classic CAD sketch constraints."

  - rule: "std::sync::RwLock (not tokio::sync::RwLock) is intentional in ConcurrentEvalAdapter"
    why: "Expression eval is CPU-bound microsecond work. Locks are never held across .await points. tokio locks would add unnecessary overhead. Do not flag this as a bug."

  - rule: "Never add .task/ files to main branch during merges"
    why: "Task state is managed externally via fused-memory, not tracked in git"

references:
  language_spec: docs/reify-language-spec.md
  stdlib_reference: docs/reify-stdlib-reference.md
  gap_register: docs/architecture-audit/gap-register.md
  audit_brief: docs/architecture-audit/audit-brief.md
  prd_skill: .claude/skills/prd/SKILL.md

# Tools the /review skill should invoke during Phase 2 (architectural
# coherence). Each entry is a command + a short description of what
# the tool detects and how to interpret its output.
phase2_scanners:
  - name: "G-tool: orphan-producer audit (Portfolio approach G)"
    command: "./scripts/audit-orphan-producers.sh --format markdown"
    detects: >
      Public functions in crates/reify-*/src/ whose only callers are
      tests, the defining file, comments, or pub-use re-exports —
      "Type A" producer-orphans per phase-3-scaffold-pattern-critique.md.
      Corpus-level only; never run per-task (anti-gaming).
    baseline: docs/architecture-audit/g-tool-baseline-report.md
    triage: >
      For each orphan, file a follow-up task to wire a production
      consumer OR remove the function OR add `// G-allow: <reason>` on
      the line directly above `pub fn` (multi-line allow markers are
      NOT recognized — the script's regex only checks the immediately
      preceding line). Diff against the baseline to spot regressions
      or remediation.

# The architecture audit's gap register (docs/architecture-audit/gap-register.md)
# is the live source of truth for known gaps. As of 2026-05-14 every entry
# in the register is paired with tracked tasks (deps explicit, owners named,
# resolutions either in flight or PRD-shape work scheduled per the /prd gates).
#
# `known_gaps` per subproject below is therefore intentionally light: it points
# at the register and surfaces only the structural concerns reviewers must keep
# in mind. The ongoing review concern is detection of NEW gaps of the same
# shape, not enumeration of the existing tracked ones.

subprojects:
  language-pipeline:
    purpose: >
      The core compilation and evaluation stack. Parses .ri source files via Tree-sitter,
      type-checks with a 9-base-quantity dimensional analysis system, elaborates into an
      evaluation graph of 7 node types, and evaluates demand-driven with immutable
      HAMT-backed snapshots and content-hash early cutoff. This is the foundation —
      if this breaks, everything breaks.

    key_scenarios:
      - "A .ri source file is parsed, compiled, and evaluated: param defaults propagate, let bindings compute in dependency order, constraints report satisfied/violated"
      - "Incremental re-evaluation after a parameter edit: dirty/demand cone intersection computes the minimal eval set, early cutoff skips unchanged nodes"
      - "Auto parameter resolution: two-phase eval (value eval → constraint solve → re-eval dependent let bindings) correctly resolves undetermined params"
      - "Purpose activation: dynamic constraint injection at runtime without recompilation, with correct reverse-index rebuild"
      - "Guard-controlled topology: when a guard cell's boolean changes, the active set of value cells and constraints changes (topology rebuild, not just value re-eval)"
      - "Multi-module compilation: import resolution via ModuleDag with topological ordering and cycle detection"
      - "Structure-instance runtime: StructureName(field: value, …) ctors evaluate to a typed Value variant carrying resolved cells (GR-001 resolution in flight under PRD docs/prds/v0_3/structure-instance-runtime.md)"

    what_working_means:
      - "Parsing a valid .ri file produces a ParsedModule with no errors and correct source spans"
      - "Compiling produces TopologyTemplates with correct ValueCellId paths and compiled expression trees"
      - "Evaluating produces Value::Scalar with correct SI values and dimension vectors"
      - "Content hashes are stable across re-parses of identical source and differ after any change"
      - "edit_param triggers re-evaluation of only the dirty-demand intersection; unrelated nodes are cache hits"
      - "All tests pass: cargo test -p reify-types reify-expr reify-syntax reify-compiler reify-eval"

    key_decisions:
      - decision: "Custom incremental evaluation engine instead of Salsa"
        why: "Salsa was evaluated and rejected (see docs/research/salsa-fit-gap-analysis.md) — Reify's snapshot model, two-phase resolution, and topology-changing guards don't fit Salsa's memoization model"

      - decision: "Immutable snapshots via im-rs HAMT with O(1) clone"
        why: "Load-bearing for concurrent edit path. prepare_concurrent_edit relies on O(1) state handoff. NodeCache clone intentionally drops warm_state to avoid leaking solver state across snapshots."

      - decision: "Two-phase auto resolution (eval → solve → re-eval)"
        why: "Auto cells start as (Undef, Auto) and are never touched by the normal expression evaluator. The solver runs after the main eval wave, then a second propagation wave updates dependent let bindings. Reviewers expecting a single eval pass will be confused."

      - decision: "Tree-sitter grammar compiled as C library linked at build time, with two-pass lowering"
        why: "First pass collects known_enums so the second pass can disambiguate Direction.In (enum access) from member access"

      - decision: "structure and occurrence compile to identical TopologyTemplate, differentiated only by EntityKind enum"
        why: "Semantics differ (thing-that-exists vs process/transformation) but the evaluation engine treats both identically. Ports, connections, and chain declarations work on both."

      - decision: "Trait conformance is nominal, not structural"
        why: "Reify's anti-thesis is 'physical/mechanical nonsense should be hard to encode'. structure_def : TraitName declarations are the explicit locus of author intent. Structural admission would silently equate physically-distinct shapes with coincident cell names (e.g. ShellStress / LaminateStress). Reviewers familiar with TypeScript/Go structural typing should not flag this as a missing feature."

    known_gaps:
      - what: "Structure-constructor runtime evaluation (Value::StructureInstance variant) — Steel_AISI_1045() currently returns Value::Undef"
        why: "GR-001 in the gap register; transitive blocker for ~17 of 40 PRDs (FEA, multi-load-case, shells, etc.). PRD docs/prds/v0_3/structure-instance-runtime.md authored 2026-05-12; tasks 3540/3542/3544/3546/3549 in flight."
        tracking: "GR-001 / task 3540 (SIR-α foundation, in-progress)"

    exclude:
      - ".worktrees/ — orchestrator working copies, not reviewed"
      - ".eval-worktrees/ — eval framework working copies, not reviewed"
      - "tree-sitter-reify/src/ — generated C parser output"
      - "target/ — build artifacts"

  constraints-and-geometry:
    purpose: >
      Constraint solving and geometry generation across a multi-kernel architecture.
      The constraint system routes auto-parameter resolution through domain-specific
      solvers (Nelder-Mead for dimensional, SolveSpace for geometric, pure-Rust
      backtracking for logical). The geometry layer dispatches compiled GeometryOps
      across five kernels (OCCT, Manifold, Fidget, OpenVDB, Gmsh) via a capability-
      descriptor dispatcher with BFS conversion-chain routing. The stdlib provides
      dimension-aware math builtins and geometric value constructors.

    key_scenarios:
      - "Auto params are solved: ResolutionProblem → decompose into independent components via union-find → route each to domain-specific solver → merge results"
      - "Geometry primitive (box/cylinder/sphere) evaluates through the dispatcher → selected kernel → kernel-specific FFI → shape stored by handle ID"
      - "Boolean operations cross kernels: a Manifold-only mesh boolean can run on OCCT-produced shapes via auto-tessellation, with the dispatcher BFSing the conversion chain"
      - "STEP/STL export serializes the final shape (OCCT-owned)"
      - "Tessellation produces vertices/indices/normals for GUI viewport"
      - "Warm-start: OCCT shapes serialize to BRep ASCII, restore on re-evaluation without replaying all ops"
      - "Stdlib trig functions enforce ANGLE dimension — sin(5mm) returns Undef"
      - "An imported field source (VDB / HDF5 / CSV) elaborates to a runtime field value (currently FICTION at engine_eval.rs:621 — GR-003 in flight)"

    what_working_means:
      - "Constraint solving converges for dimensional problems (Nelder-Mead, feasibility < 1e-12)"
      - "SolveSpace recognizes pattern-matched constraints (distance, angle, parallel, perpendicular, coincident)"
      - "OCCT primitives, booleans, transforms, and export all produce valid output"
      - "Manifold mesh-Boolean operations produce valid output on tessellated inputs"
      - "Fidget JIT evaluates SDF primitives and Boolean ops"
      - "Gmsh tetrahedral remesh produces valid volume mesh"
      - "Tessellation produces non-empty mesh data"
      - "Cross-kernel dispatch finds a valid plan when one exists; fails cleanly when no conversion chain reaches the demanded ReprKind"
      - "All stdlib builtins return correct values with correct dimensions; wrong-dimension inputs return Undef"
      - "All tests pass: cargo test -p reify-constraints reify-geometry reify-kernel-occt reify-kernel-manifold reify-kernel-fidget reify-kernel-openvdb reify-kernel-gmsh reify-stdlib"

    key_decisions:
      - decision: "Multi-kernel architecture with capability descriptors and BFS conversion-chain dispatch"
        why: "OCCT alone cannot serve every geometry op (mesh booleans, SDF JIT, voxel ops, FEA-grade meshing all need different backends). Each kernel registers a CapabilityDescriptor via Rust's inventory::submit! at startup; the dispatcher (reify-eval/src/dispatcher.rs) BFSes the conversion graph to route ops. Multi-kernel Phase 3 PRD (docs/prds/v0_3/multi-kernel-phase-3.md) decomposes the consumer-side wiring; tasks 3432–3448 are the live DAG."

      - decision: "CpSatSolver is pure-Rust backtracking, NOT backed by Google OR-Tools despite the name"
        why: "Named CpSatSolver for spec alignment. Pure Rust is sufficient for v0.1 problem sizes (integer domains capped at 1000 values). SolverRegistry is designed for real OR-Tools substitution later."

      - decision: "SolveSpace libslvs has a global Mutex serializing all Slvs_Solve calls"
        why: "libslvs has global internal state. A hard compile_error fires if slvs is not found but solvespace.rs is compiled."

      - decision: "Geometry values (Point, Vector, Frame) in stdlib are mathematical objects separate from kernel-owned shapes referenced by opaque GeometryHandleId"
        why: "Two levels that never mix directly: Value::Frame is a first-class runtime value for constraint math; GeometryHandleId(3) is a pointer into the kernel's shape store."

      - decision: "Each kernel detected at build time with transparent stub fallback"
        why: "If kernel headers/libs are absent (OCCT, Gmsh, OpenVDB), the crate compiles to stubs returning errors. *_AVAILABLE bools let downstream code skip tests at runtime. Headless / partial-deps environments work."

    known_gaps:
      - what: "OpenVDB Imported-field consumer arm in elaborate_field returns Value::Undef"
        why: "GR-003 in the gap register. Reciprocal contested ownership between imported-field-source and multi-kernel PRDs resolved 2026-05-12: multi-kernel owns the wiring as task θ=3439 in the multi-kernel-phase-3 DAG."
        tracking: "GR-003 / task 3439"

      - what: "OpenVDB voxel-Boolean FFI is stubbed; Fidget SDF→Mesh tessellation deferred to v0.2"
        why: "Producer infrastructure exists with kernel-level stub fallback. Both intentionally feature-gated — see kernels' lib.rs for the cfg(has_*) splits."
        tracking: "Multi-kernel-phase-3 DAG (3432–3448)"

    exclude:
      - "docs/research/ — background research, not application code"

  kinematics:
    purpose: >
      Mechanism modelling and forward/closed-chain kinematics, implemented entirely as
      stdlib (no new engine node kinds). Users compose joints (prismatic, revolute,
      cylindrical, planar, spherical, fixed, coupling) into a mechanism via a fluent
      builder, then take pose snapshots at joint configurations or sweep a joint
      across a range with warm-start across steps. Closed chains are solved by
      Gauss-Newton iteration on SE(3) residuals.

    key_scenarios:
      - "User writes mechanism().body(...).body(...) joining bodies with joints; snapshot(mech, bindings) returns a pose Map"
      - "sweep(mech, joint, range, steps) walks a joint over a range, warm-starting closed-chain free variables from the previous step"
      - "Closed chains (loops) are solved per loop with Gauss-Newton on SE(3) residuals; convergence reported in the snapshot Map"
      - "Forward kinematics for open chains: tree-walk from world along the mechanism spanning tree"

    what_working_means:
      - "Open chains with prismatic + revolute + coupling + fixed joints produce correct snapshot poses"
      - "Single-DOF closed chains converge under Gauss-Newton iteration"
      - "sweep warm-starts free variables correctly across consecutive steps"
      - "Joint Jacobian columns are correct for the wired joint kinds"

    key_decisions:
      - decision: "Kinematics is self-contained in stdlib; no new engine eval kinds, no new constraint solver integration"
        why: "Per the PRD's 'minimal core, rich libraries' principle. The closed-chain solver (loop_closure_solver.rs) is its own pure-Rust Gauss-Newton implementation rather than going through SolveSpace. Reviewers may expect a constraint-solver hookup; there is none."

      - decision: "Bare Gauss-Newton (no Levenberg-Marquardt damping or line search) for loop closure"
        why: "Acceptable for v0.1 per kinematic-constraints PRD. Damping is a future improvement; the current solver works for low-DOF mechanisms."

      - decision: "Multi-DOF joints (planar, spherical, cylindrical) are split from closed-chain solving"
        why: "Their analytic Jacobians are future work; current implementation provides standalone open-chain transforms only. Closed-chain solver's f64-per-joint signature cannot vectorize multi-DOF joints. Per task 2670 decision; tracked for follow-up."

      - decision: "No inverse kinematics in v0.1"
        why: "Explicit out-of-scope per kinematic-constraints PRD; future feature with its own PRD if motivated by user demand."

    known_gaps:
      - what: "Multi-DOF joints (planar, spherical, cylindrical) cannot appear in loop-closure chains"
        why: "Analytic Jacobians not yet implemented; current fallback returns zero placeholders. Affects only mechanisms with closed loops AND multi-DOF joints — a narrow combination."
        tracking: "kinematic-constraints PRD follow-ups; see gap-register"

      - what: "Singularity / overconstrained / underconstrained diagnostics reserved but not wired into snapshot/sweep"
        why: "Diagnostic wrapper exists and is unit-tested, but pre-check on 6 residuals is too strict for low-DOF fixtures. Snapshot Map currently lacks the is_singular flag the PRD promised."
        tracking: "kinematic-constraints PRD follow-ups; see gap-register"

    exclude: []

  analysis:
    purpose: >
      Structural analysis stack — finite-element solvers, mesh morphing for
      shape updates, and shell-mid-surface extraction from thin solids. Currently
      mostly producer-side scaffold; the user-facing path (an .ri file invoking
      solve_elastic_static and getting back a stress field) is gated on GR-002
      (ComputeNode dispatch) landing.

    key_scenarios:
      - "An .ri file declares loads and supports on a structure; solve_elastic_static evaluates as a ComputeNode and returns a stress field"
      - "Mesh morph: under shape-parameter edit the existing mesh is deformed via linear-elasticity FEM rather than remeshed from scratch (eligibility classifier picks Laplacian / elasticity-morph / remesh-fallback)"
      - "Shell extraction: a thin solid is reduced to a shell mid-surface via voxel medial-axis detection, then meshed for shell FEM"
      - "Calibration sweeps: morph quality knobs are tuned against synthetic fixtures (box, plate-with-hole, bracket-fillet)"

    what_working_means:
      - "reify-solver-elastic reference-element kernels produce correct shape function values, Jacobians, and stiffness contributions for P1/P2 tets and P1 hex/wedge"
      - "Conjugate-gradient linear solver converges on synthetic stiffness systems"
      - "Mesh-morph eligibility classifier correctly chooses between Laplacian / elasticity / remesh paths"
      - "Mesh-morph elasticity path produces a deformed mesh meeting the calibrated quality floor (default quality_floor_pct_below_025 = 0.01)"
      - "Shell-extract voxel medial-axis detector returns the expected mid-surface for the canonical thin-plate fixture"
      - "All tests pass: cargo test -p reify-solver-elastic reify-mesh-morph reify-shell-extract"

    key_decisions:
      - decision: "FEA stack is producer-only until GR-002 (ComputeNode @optimized fn dispatch) lands"
        why: "Per the architecture audit: ComputeNode contract authored 2026-05-12 as docs/prds/v0_3/compute-node-contract.md, decomposed into 12 tasks 3420–3431. solve_elastic_static @optimized registration is a vertical-slice consumer of that DAG (task η=3426). Reviewers should not flag the absence of an end-to-end .ri FEA example as a bug."

      - decision: "Mesh-morph quality floor defaults are calibrated against synthetic fixtures and intentionally locked in production"
        why: "quality_floor_pct_below_025 = 0.01 was tuned in the calibration sweep harness (reify-mesh-morph fixtures::box_mesh, plate_with_hole, bracket); changing it without re-running the sweep is a silent regression risk. The calibration harness (sweep::run_sweep + SweepReport) is the authoritative test for any default change."

      - decision: "Shell extraction uses per-voxel medial-axis test; on even-N grids no single radius works, so the implementation uses a tolerant 'empty OR centered' pattern"
        why: "Recorded in project memory: even-N grid + point-medial geometry (sphere) cannot be tested by a single radius (abs_diff = 2|V| ≥ 1.732 > threshold ≤ 1.5). Reviewers may flag the tolerance as imprecise; it is the deliberate fix."

    known_gaps:
      - what: "Whole stack is producer-only; no .ri file currently exercises FEA end-to-end"
        why: "Blocked on GR-002 (ComputeNode @optimized fn dispatch)."
        tracking: "GR-002 / DAG 3420–3431; consumer slice η=3426"

      - what: "Shell-extract beyond T1 (medial-axis detector): T2 mesh extraction, T3 branch pruning, T4 region segmentation"
        why: "Phased per the shells PRD; T1 ships first because it's the foundation."
        tracking: "structural-analysis-shells PRD"

    exclude: []

  runtime:
    purpose: >
      Async evaluation scheduler on top of reify-eval. Fans independent evaluation nodes
      across Tokio thread pool by topological level, manages warm-start state pools for
      stateful solvers, and provides cooperative cancellation and priority promotion
      infrastructure. The sequential path is fully wired; the concurrent path works
      end-to-end but advanced scheduling policies are not yet integrated.

    key_scenarios:
      - "ConcurrentScheduler groups dirty nodes by topological level, spawns all nodes within a level as tokio tasks, waits for level completion before advancing"
      - "WarmStatePool budgets memory for solver warm-start states with LRU eviction"
      - "Cooperative cancellation checks at level boundaries (not mid-level)"
      - "Resolution (NLopt) runs sequentially after concurrent value evaluation — architecturally correct since NLopt is single-threaded"

    what_working_means:
      - "SequentialScheduler produces correct eval results for the bracket fixture"
      - "ConcurrentScheduler produces identical results to sequential for the same inputs"
      - "WarmStatePool evicts LRU items when budget exceeded; oversized single items still accepted"
      - "Cancellation at level boundary stops further evaluation"
      - "All tests pass: cargo test -p reify-runtime"

    key_decisions:
      - decision: "std::sync::RwLock in ConcurrentEvalAdapter, not tokio::sync::RwLock"
        why: "Expression eval is CPU-bound microseconds. Locks never held across .await. Using tokio locks would add unnecessary overhead."

      - decision: "Oversized warm-start items stored unconditionally when pool is empty"
        why: "Over-budget by one item is acceptable. A single giant solver state is more valuable than budget purity."

      - decision: "Priority ordered by enum declaration (lower discriminant = higher priority) via derived Ord"
        why: "P0Interactive < P1Fast < P1Slow < P3Speculative. min_by_key treats smaller = better. Promotions use new_priority < *current."

      - decision: "Lock poisoning recovered everywhere with unwrap_or_else(|e| e.into_inner())"
        why: "A panicked worker thread should not cascade failures to the scheduler thread via Mutex poisoning."

    known_gaps:
      - what: "WarmStatePool::drain_events is not yet wired to its consumer"
        why: "Tracked under task 3582 (in-flight from /review session 2026-05-14)."
        tracking: "task 3582"

    exclude: []

  tooling:
    purpose: >
      User-facing tools: an LSP server for editor integration, an MCP server for LLM access,
      and a CLI binary that ties everything together. The LSP provides diagnostics, hover,
      go-to-def, and completions. The MCP exposes 16 tools across read/write/navigation/reference
      categories. The CLI dispatches check, build, lsp, gui, mcp-server, and doc subcommands.

    key_scenarios:
      - "Engineer editing .ri files gets live diagnostics, hover info, and completions via LSP"
      - "LLM reads/modifies .ri designs via MCP tools — get_parameters, set_parameter, update_source with immediate diagnostic feedback"
      - "LLM uses reify_language_reference to look up DSL syntax before generating code"
      - "CLI check command validates constraints and exits non-zero on violations (CI-suitable)"
      - "CLI build command produces STEP/STL files via full OCCT pipeline"
      - "LSP embeddable in-process via InProcessLsp for Tauri GUI (no stdio overhead)"

    what_working_means:
      - "reify check exits 0 for satisfied constraints, non-zero for violations"
      - "reify build produces non-empty STEP files"
      - "LSP reports diagnostics with correct source spans for parse errors and constraint violations"
      - "MCP tools/list returns exactly 16 tools"
      - "MCP set_parameter updates values visible in subsequent get_parameters"
      - "All tests pass: cargo test -p reify-lsp reify-mcp reify-cli"

    key_decisions:
      - decision: "MCP tool errors use isError:true in result body, not JSON-RPC error field"
        why: "MCP protocol spec requires tool-level errors as result content, not top-level errors. JSON-RPC error field is only for protocol failures."

      - decision: "CliToolContext does not support geometry export — reify_export MCP tool always errors in headless mode"
        why: "Export requires the geometry kernel, which is only initialized in the build command, not in the MCP context. The tool exists for the GUI's MCP context."

      - decision: "NotificationSink trait decouples diagnostic publication from transport"
        why: "Enables the same LSP server to run on stdio (ClientSink), embedded in Tauri (TauriNotificationSink), or in tests (RecordingSink)"

      - decision: "17 language reference topics compiled into MCP binary via include_str!()"
        why: "LLM-readable reference so models can look up syntax before generating .ri code. Markdown files in src/tools/chunks/."

    known_gaps:
      - what: "Some CLI command paths still emit placeholder text (main.rs:328, :368, :531)"
        why: "Tracked under task 3562 (in-flight from /review session 2026-05-14)."
        tracking: "task 3562"

    exclude:
      - "crates/reify-mcp/src/tools/chunks/ — static markdown reference content, not logic"

  doc-tooling:
    purpose: >
      Documentation generation for Reify modules: a doc-model library (reify-doc) plus
      the build CLI (reify-doc-build) that generates Markdown / HTML / JSON reference
      docs from compiled module metadata (doc comments, parameter tables, port tables,
      constraints, meta blocks, trait bounds). Faithful, non-editorialized human-readable
      reference output.

    key_scenarios:
      - "User runs reify doc <file>.ri and gets a Markdown / HTML / JSON file describing every public structure / fn / trait / constraint with their resolved types and unit dimensions"
      - "Doc-comment propagation: triple-slash /// comments survive parse → compile → doc-model and emit verbatim into the output"
      - "PRD §meta block rendering is alphabetic-key-sorted for deterministic output"

    what_working_means:
      - "reify doc on examples/m5_geometry.ri produces a non-empty document containing every declared parameter and constraint"
      - "Doc model deterministic across re-runs on identical source"
      - "All tests pass: cargo test -p reify-doc reify-doc-build"

    key_decisions:
      - decision: "Doc-build is non-interactive and non-editorial — no synthesized prose, only structured extraction"
        why: "v0.1 scope is faithful reference output. Editorialized prose, search/theming/version-diff are explicit v0.2+ deferrals."

      - decision: "PRD §meta block rendering uses alphabetic-key sort"
        why: "Deterministic output guarantee. Reviewers may expect source-order; alphabetic is the documented contract."

    known_gaps:
      - what: "build_doc_model + CLI placeholder paths"
        why: "Tracked under task 3562 (in-flight from /review session 2026-05-14). HTML formatter exists but the CLI uses render_html_stub."
        tracking: "task 3562"

    exclude: []

  gui:
    purpose: >
      Tauri 2 desktop application with SolidJS frontend. Provides a live Three.js 3D viewport,
      CodeMirror 6 code editor with in-process LSP, property editor for parametric values,
      constraint status panel, and a Claude Code chat panel (UI complete, sidecar wiring pending).
      Source-to-viewport and viewport-to-source bidirectional navigation is fully implemented.

    key_scenarios:
      - "Opening a .ri file shows source in the editor and tessellated geometry in the viewport"
      - "Editing source triggers re-evaluation; viewport mesh updates via incremental delta events"
      - "Editing a value in the property editor triggers constraint re-check and viewport update"
      - "Clicking a mesh in the viewport scrolls the editor to the corresponding source location"
      - "Double-clicking a property group header flies the viewport camera to that entity"
      - "CodeMirror editor provides syntax highlighting via custom Lezer grammar, LSP diagnostics, completions, hover, goto-def"
      - "Claude chat panel renders messages, thinking blocks, tool call cards (sidecar integration pending)"
      - "screenshot_window debug-MCP tool captures the current viewport for offline inspection (REIFY_DEBUG=1 listener on :3939)"

    what_working_means:
      - "Tauri app launches and shows app-layout (not stuck on loading spinner)"
      - "Opening a .ri file renders geometry in the viewport and source in the editor"
      - "Status bar shows idle phase, nonzero triangle count, and constraint counts"
      - "Editing source shows 'Evaluating...' spinner then updated mesh"
      - "Property editor changes propagate to constraints and viewport"
      - "Bidirectional navigation works: viewport click → editor scroll, property double-click → camera fly-to"
      - "Unit tests pass: npm test (vitest)"

    key_decisions:
      - decision: "SolidJS (not React) for the frontend"
        why: "Fine-grained reactivity without virtual DOM. Store updates via produce() for surgical state mutations. Reviewers familiar with React will see different patterns."

      - decision: "Tauri 2 + Three.js (Option B from PRD) instead of pure wgpu+egui"
        why: "Fastest path to alpha. Three.js provides orbit controls, lighting, raycasting out of the box. Web tech excels at data-dense panels. IPC overhead is bounded (mesh deltas, not full state)."

      - decision: "In-process LSP via InProcessLsp bridge instead of stdio"
        why: "Avoids IPC overhead for the built-in editor. _keepalive field exists to keep the tower-lsp Client sender channel alive."

      - decision: "Custom Lezer grammar (reify.grammar) for CodeMirror syntax highlighting"
        why: "Covers the full language surface. Must be compiled (build:grammar script) before tests run."

      - decision: "Node.js sidecar for Claude Code integration, not direct API calls"
        why: "Claude Code SDK runs as a subprocess (claude --print --output-format stream-json). Session continuity via --resume. The sidecar manages process lifecycle."

      - decision: "Delta-based IPC for engine state updates (mesh-update, value-update, etc.)"
        why: "compute_delta diffs against last_state and emits per-item events. Avoids sending full state on every edit."

      - decision: "Auto-rendered XYZ axis triad in the viewport"
        why: "The triad is a viewport affordance, not a model feature. Do NOT add an axis triad to .ri models."

    known_gaps: []

    exclude:
      - "gui/node_modules/ — third-party dependencies"
      - "gui/sidecar/node_modules/ — sidecar dependencies"
