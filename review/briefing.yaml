project: reify

# /audit integration knob. /review Phase 2 invokes the project's /audit
# skill (.claude/skills/audit/) as Step 1; this controls how far back it
# looks. See dark-factory: skills/review-briefing/references/briefing-schema.md.
audit:
  window_days: 14   # default

# Conventions and rules with teeth — violations are always bugs.
conventions:
  - rule: "No latent untracked incomplete or ill-formed implementation chains may accumulate. Every public producer must have a real production consumer, OR a `// G-allow: <reason citing tracked task>` marker on the line directly above `pub fn`, OR be removed. Cross-PRD seams must have a named owner."
    why: "The 2026-05-12 architecture audit found ~19 of 44 mechanism clusters fit this 'scaffold without a caller' shape (producer side built, no production consumer). The remediation has been explicitly painful and is the dominant Reify-specific failure mode. New PRDs prevent re-introduction via the /prd skill's gates G1–G6+META; corpus-wide detection is via scripts/audit-orphan-producers.sh (baseline at docs/architecture-audit/g-tool-baseline-report.md). Reviewers should treat any new producer-orphan as a high-priority finding."

  - rule: "All new PRDs go through the /prd skill (.claude/skills/prd/) — never freehand-author a PRD or queue tasks from one"
    why: "The skill walks audit-derived gates that prevent the failure modes the audit surfaced: G1 (consumer named), G2 (user-observable leaf signal), G3 (assumed-substrate verified against the REAL reify binary — the tree-sitter CLI is stale; use `reify check`), G4 (cross-PRD seam ownership), G5 (design-first contracts when stakes are high), G6 (premise validity — guards the recurring 'stale-premise' trap where the gap was already closed or the named substrate doesn't exist), META (would the PRD produce a complete/coherent/cohesive/good design under decompose-and-queue without further oversight?). Decompose mode files via fused-memory submit_task with planning_mode=True and bulk-flips deferred→pending after wiring all dependencies."

  - rule: "Errors must be noisy — never silently swallow logic errors with unwrap_or(Value::Undef), unwrap_or(0.0), unwrap_or(Type::Real), or similar default-on-error patterns"
    why: "Strong team norm. Silent defaults mask bugs. The only acceptable exception is sanitize_value converting NaN/Inf to Undef at the stdlib boundary. Any other exception must be scrutinized closely and discussed in depth."

  - rule: "All task operations route through fused-memory MCP tools, never Taskmaster CLI or MCP directly"
    why: "Taskmaster was removed entirely 2026-05-12. fused-memory is the only task interface; never inspect or commit tasks.json or tasks.db. TaskInterceptor must see every state transition to trigger reconciliation events. Task IDs are PER-PROJECT — query with project_root=/home/leo/src/reify (a wrong project_root returns a coincidental unrelated task, not an error)."

  - rule: "OCCT kernel operations must run on the dedicated std::thread via OcctKernelHandle actor pattern — never directly from async context"
    why: "OCCT uses process-global state (memory allocators, shape naming tables, exception state). OcctKernel is !Send+!Sync. Sync trait methods panic if called from async context; use _async variants instead."

  - rule: "Gmsh kernel operations must hold init::GMSH_LOCK for any libgmsh call"
    why: "libgmsh is process-globally non-thread-safe. Tests acquire the lock before touching the library. Multi-kernel dispatch must serialize on this lock when routing to the Gmsh kernel."

  - rule: "The core pipeline crate layering is strict and machine-checked: reify-core ← reify-ast ← reify-ir, with reify-syntax producing reify-ast. reify-ast must NEVER depend on reify-ir/reify-syntax (any dep kind). 'Meaning never depends on surface syntax.'"
    why: "The 2026-05 core-ast-ir-layering refactor split the former monolithic reify-types crate into reify-core (primitives, DimensionVector, Type), reify-ast (source-as-written AST: identifiers unresolved, operators as strings), and reify-ir (compiled runtime: Value, geometry handles, solvers, warm-state). The only legal back-reference is the 'deferred-code pattern' — an IR node embedding an unevaluated reify_ast::Expr by value (e.g. AnnotationArgValue::Expr). Enforced by per-crate dag_invariant.rs tests and scripts/assert-crate-dag.sh (B1–B6). NOTE: reify-expr is the expression EVALUATOR, not the expression AST (that's reify-ast) — a naming trap. There is no reify-types crate; do not cite it."

  - rule: "Geometry type refinement is expressed as marker traits on a single Type::Geometry — NOT distinct Solid/Surface/Curve value-types"
    why: "7 marker traits + InferredTraits inference + a computed dimension enum (GeomDim{Curve,Surface,Solid}) + markers like Planar/Closed compose 2D∧Closed∧Planar without a 2^N type plethora. Reify's anti-thesis is 'physical nonsense should be hard to encode' without that explosion. Reviewers from typed-geometry CAD kernels will flag the absence of Solid/Surface/Curve types as missing — it is deliberate (decisions_geometry_traits_not_types; GHR-β/3604: value-rep invariant relaxed, types not forbidden, just worse). Conformance is permissive: reject only statically-known mismatches. plane_*/axis_* constructors live in reify-stdlib eval_builtin — always check reify-stdlib, not just compiler/eval, before declaring a constructor missing."

  - rule: "Reify grammar has NO method-call syntax `x.foo()` (GR-040) — use free-function form `foo(x)`; named args use colons `foo(x: 1)`"
    why: "Dot is reserved for qualified enum-variant access (Direction.In) and member access. The language spec's own composed-field/method examples are fiction. A reviewer porting spec examples verbatim will write code that doesn't parse. Enum values are always QUALIFIED EnumName.Variant — bare variant names are unresolved."

  - rule: "Kernel-provenance signals belong on `reify build` (which realizes geometry), never `reify check` (constraint-only by design). `reify eval`/`reify check` attach NO constraint solver."
    why: "Provenance is a safety signal (silent solid→mesh kernel downgrade), so it must surface where geometry is actually realized; `build` does not reject unknown flags, `check` is constraint-only and does. Because eval/check attach no solver, auto-resolved params evaluate to Undef from those entry points — CLI leaf-signals for solver-dependent or kernel-dependent features are unobservable via eval/check until a solver/kernel is wired (reify_eval_cli_no_solver; multikernel_cli_observability)."

  - rule: "The three tolerance subsystems — kernel mesh-budget tolerance, tolerance-stackup, and GD&T (§7) — are distinct and must never be conflated"
    why: "They look similar but model different things: mesh deflection budget vs stack-up accumulation vs geometric dimensioning & tolerancing. reify-stdlib/src/tolerancing.rs (GD&T) is a sibling of stackup.rs; dfm.rs (§8 DFM) is a third sibling. Conflating them silently equates physically-distinct concerns. Each is its own declarative constraint-def surface over design-declared / measured values."

  - rule: "Angle (radian) is a genuine physical dimension (DimensionVector index 7), not dimensionless"
    why: "Engineering-motivated. sin(5mm) must return Undef, not a number. Trig functions require ANGLE dimension or bare Real. This is unusual vs. most physics libraries and reviewers will question it."

  - rule: "DimensionVector uses Rational with i16/i16 exponents, not i8"
    why: "Multiplication of dimension exponents (e.g. in cross product, sqrt) can overflow i8 range (i8*i8 max = 16129 < i16::MAX)"

  - rule: "SI base units are canonical — all Value::Scalar si_value fields are in metres, kilograms, seconds, radians"
    why: "Unit conversions happen once at compile time (unit_to_scalar in reify-compiler). Mixing converted and unconverted values is a class of bug. A fn return-type is NOT a dimensional checksum (wrong-exponent return checks pass clean) but binary +/- ARE dimension-checked — validate physical-constant work via physics-identity cross-checks, not return types."

  - rule: "Value::Undef propagates through all arithmetic as quiet-NaN semantics — division by zero produces Undef, not panic"
    why: "Constraint checker treats Undef inputs as Indeterminate rather than Violated. Panicking on undetermined values would crash the incremental engine mid-evaluation."

  - rule: "Quality is king — deal with real technical debt ruthlessly. Issues may dangle briefly only if there is a task in the queue that will resolve them and the debt won't compound in the meantime."
    why: "Strong team norm. No gaps should exist without tasks to fill them."

  - rule: "Structure constructors are PascalCase (Steel_AISI_1045, FixedSupport, LoadCase). Do not introduce snake_case ctor names for new structures."
    why: "GR-001 resolution (2026-05-12): the historical snake_case/PascalCase split (point_load vs FixedSupport) collapses on PascalCase as struct-instance runtime lands. Existing snake_case builtins are being rewritten as stdlib structure_defs producing the same shape. New code should not re-introduce the split."

  - rule: "libslvs (SolveSpace) is essential for v0.1, not optional"
    why: "Geometric constraint solving falls back to Nelder-Mead penalty functions without it, which is less efficient and less reliable for classic CAD sketch constraints."

  - rule: "std::sync::RwLock (not tokio::sync::RwLock) is intentional in ConcurrentEvalAdapter"
    why: "Expression eval is CPU-bound microsecond work. Locks are never held across .await points. tokio locks would add unnecessary overhead. Do not flag this as a bug."

  - rule: "External slicers/tools are integrated as subprocesses, never FFI-linked"
    why: "PrusaSlicer (FDM as-printed FEA R0+ path) runs as a subprocess so its AGPL stays at a clean license boundary ('mere aggregation'); FFI-linking libslic3r would permanently weld Reify's license to the slicer's AGPL and pull in the §13 network clause. Per-bead geometry is recovered by parsing G-code comments, not linking."

  - rule: "Never add .task/ or tasks.json/tasks.db files to main branch during merges"
    why: "Task state is managed externally via fused-memory, not tracked in git"

