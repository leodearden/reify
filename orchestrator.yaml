# Reify orchestrator configuration
# Rust + Tauri/TypeScript (GUI) project

# Concurrency
max_concurrent_tasks: 48
max_per_module: 1
lock_depth: 3
module_overrides:
  tests: 2
  "gui/src": 4    # frontend tasks create separate subdirs (viewport/, editor/, panels/) — safe to parallelize

# Verification commands (Rust + GUI frontend)
# package-lock.json is committed — use npm ci for reproducible installs
# Commands use `cargo --workspace`; orchestrator's scope_cargo rewriter rewrites
# to `cargo -p <crate>` when all task files live in one crate. Do not pre-scope.
test_command: ". ~/.cargo/env && ./scripts/tree-sitter-generate.sh && cargo test --workspace -- --test-threads=1 && if test -d gui; then (cd gui && npm ci && npm test); fi && if test -f gui/sidecar/package-lock.json; then (cd gui/sidecar && npm ci); fi && if test -f tree-sitter-reify/package-lock.json; then (cd tree-sitter-reify && npm ci); fi && if test -f tests/sync_comments_test.sh; then bash tests/sync_comments_test.sh; else echo 'WARNING: sync_comments_test.sh not found, skipping'; fi && if test -f tests/infra/run_all.sh; then bash tests/infra/run_all.sh; fi"
lint_command: ". ~/.cargo/env && ./scripts/tree-sitter-generate.sh && cargo clippy --workspace -- -D warnings && if test -d gui; then (cd gui && npm ci && npm run typecheck); fi && if test -f gui/sidecar/package-lock.json; then (cd gui/sidecar && npm ci); fi && if test -f tree-sitter-reify/package-lock.json; then (cd tree-sitter-reify && npm ci); fi && if test -f scripts/check-pm-standardization.sh; then bash scripts/check-pm-standardization.sh; else echo 'WARNING: check-pm-standardization.sh not found, skipping'; fi"
type_check_command: ". ~/.cargo/env && ./scripts/tree-sitter-generate.sh && cargo check --workspace"

# Run test/lint/type sequentially in one verify invocation.
# Rust workspaces take an advisory lock on target/.cargo-lock, so the three
# concurrent cargo subcommands serialize anyway — parallelism just wastes CPU.
concurrent_verify: false

# Env injected into verify subprocesses (merged on top of os.environ).
# sccache caches rustc output across worktrees; CARGO_INCREMENTAL=0 is required
# because incremental and sccache are mutually exclusive.
verify_env:
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"

# Usage cap / multi-account failover
# 5 automation accounts (F→E→C→B→D); A reserved for interactive, G not in pool.
# When one account hits its cap, UsageGate rotates to the next in list order.
usage_cap:
  enabled: true
  pause_threshold: 0.96
  wait_for_reset: true
  probe_interval_secs: 300
  max_probe_interval_secs: 1800
  accounts_file: "${REIFY_ROOT:/home/leo/src/reify}/config/usage-accounts.yaml"

# Fused memory HTTP server (systemd service on port 8002)
fused_memory:
  url: "http://127.0.0.1:8002"
  project_id: "reify"
  server_command: []

# Sandbox (disabled — bwrap uid map broken on this kernel)
sandbox:
  enabled: false

# Escalation
escalation:
  queue_dir: "data/escalations"
  port: 8100

# Git
git:
  main_branch: "main"
  branch_prefix: "task/"
  remote: "origin"
  worktree_dir: ".worktrees"

# Project root (absolute path)
project_root: "/home/leo/src/reify"
