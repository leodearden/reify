# Reify orchestrator configuration
# Rust + Tauri/TypeScript (GUI) project

# Concurrency
max_concurrent_tasks: 48
max_per_module: 1
lock_depth: 2
module_overrides:
  tests: 2
  "gui/src": 4    # frontend tasks create separate subdirs (viewport/, editor/, panels/) — safe to parallelize

# Verification commands (Rust + GUI frontend)
# package-lock.json is committed — use npm ci for reproducible installs
test_command: ". ~/.cargo/env && ./scripts/tree-sitter-generate.sh && cargo test --workspace -- --test-threads=1 && if test -d gui; then (cd gui && npm ci && npm test); fi && if test -f gui/sidecar/package-lock.json; then (cd gui/sidecar && npm ci); fi && if test -f tree-sitter-reify/package-lock.json; then (cd tree-sitter-reify && npm ci); fi && bash tests/sync_comments_test.sh && bash scripts/check-pm-standardization.sh"
lint_command: ". ~/.cargo/env && ./scripts/tree-sitter-generate.sh && cargo clippy --workspace -- -D warnings && if test -d gui; then (cd gui && npm ci && npx tsc --noEmit); fi && if test -f gui/sidecar/package-lock.json; then (cd gui/sidecar && npm ci); fi && if test -f tree-sitter-reify/package-lock.json; then (cd tree-sitter-reify && npm ci); fi"
type_check_command: ". ~/.cargo/env && ./scripts/tree-sitter-generate.sh && cargo check --workspace"

# Fused memory HTTP server (systemd service on port 8002)
fused_memory:
  url: "http://127.0.0.1:8002"
  project_id: "reify"
  server_command: []

# Sandbox (disabled — bwrap uid map broken on this kernel)
sandbox:
  enabled: false

# Escalation
escalation:
  queue_dir: "data/escalations"
  port: 8100

# Git
git:
  main_branch: "main"
  branch_prefix: "task/"
  remote: "origin"
  worktree_dir: ".worktrees"

# Project root (absolute path)
project_root: "/home/leo/src/reify"
