# Reify orchestrator configuration
# Rust + Tauri/TypeScript (GUI) project

# Concurrency
max_concurrent_tasks: 12
max_per_module: 1
lock_depth: 2
module_overrides:
  tests: 2
  "gui/src": 4    # frontend tasks create separate subdirs (viewport/, editor/, panels/) — safe to parallelize

# Iteration limits
max_execute_iterations: 10
max_verify_attempts: 5
max_review_cycles: 2

# Models per role
models:
  architect: "opus"
  implementer: "opus"
  debugger: "opus"
  reviewer: "sonnet"
  merger: "opus"

# Budget per invocation (USD)
budgets:
  architect: 5.0
  implementer: 10.0
  debugger: 5.0
  reviewer: 2.0
  merger: 5.0

# Turn limits per invocation
max_turns:
  architect: 50
  implementer: 80
  debugger: 50
  reviewer: 30
  merger: 50

# Verification commands (Rust + GUI frontend)
# npm install regenerates package-lock.json from package.json (lockfile is gitignored to avoid merge conflicts)
test_command: ". ~/.cargo/env && (cd tree-sitter-reify && tree-sitter generate) && cargo test --workspace -- --test-threads=1 && (test -d gui && cd gui && npm install && npm test || true)"
lint_command: ". ~/.cargo/env && (cd tree-sitter-reify && tree-sitter generate) && cargo clippy --workspace -- -D warnings && (test -d gui && cd gui && npm install && npx tsc --noEmit || true)"
type_check_command: ". ~/.cargo/env && (cd tree-sitter-reify && tree-sitter generate) && cargo check --workspace"

# Fused memory HTTP server (systemd service on port 8002)
fused_memory:
  url: "http://localhost:8002"
  project_id: "reify"
  server_command: []

# Sandbox (disabled — bwrap uid map broken on this kernel)
sandbox:
  enabled: false

# Escalation
escalation:
  queue_dir: "data/escalations"
  port: 8100

# Git
git:
  main_branch: "main"
  branch_prefix: "task/"
  remote: "origin"
  worktree_dir: ".worktrees"

# Project root (absolute path)
project_root: "/home/leo/src/reify"
