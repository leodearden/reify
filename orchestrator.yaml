# Reify orchestrator configuration
# Rust + Tauri/TypeScript (GUI) project

# Concurrency
# 48→24 (2026-06-04, escalation-watcher under AFK mandate): 48 concurrent tasks
# on a 32-thread box livelocked the SERIAL merge queue — every post-merge verify
# from 20:06-22:00 timed out (exit 124) because task workflows consumed the
# jobserver tokens the 60m merge verify needed; main froze for 2h at full CPU
# burn. 24 leaves the merge verify ~half the box. Revert to 48 if Leo prefers
# throughput over merge latency once the backlog drains.
max_concurrent_tasks: 24
max_per_module: 1
lock_depth: 4
# Verification commands — thin delegations to scripts/verify.sh, the single
# source of truth shared with the git hooks (hooks/project-checks +
# hooks/pre-merge-commit). All the logic lives in verify.sh: a single
# `cargo nextest run --workspace` pass (OCCT crates folded into the pool via
# the nextest occt test-group max-threads=4; task 4451), the release-sensitive
# crate nextest pass, the sccache/jobserver/OCCT LD_LIBRARY_PATH env, the
# per-invocation timeout budgets, the tree-sitter generate prereq, and the
# npm/infra steps. `verify.sh --print-plan` emits the exact ordered command
# list it will run; the infra drift tests assert against that oracle.
# Authoritative OCCT crate list: scripts/occt-touching-crates.txt
# (shared via scripts/occt-scope-lib.sh). See `scripts/verify.sh --help`.
#
# --scope branch narrows per-task verification to files changed since
# merge-base(main, HEAD) (committed + uncommitted task work). This keeps
# per-task TDD iterations fast: a docs-only task runs no cargo, a
# frontend-only task skips the Rust pipeline, etc.
#
# The merge path (DF_VERIFY_ROLE=merge) keeps full scope: hooks/pre-merge-commit
# uses --scope all explicitly, and the orchestrator merge pipeline does not
# invoke test_command / lint_command below.
#
# No --profile here: verify.sh derives the profile from DF_VERIFY_ROLE (task 4078).
# Per-task verifies run with DF_VERIFY_ROLE=task => profile=debug (fast feedback).
# The orchestrator merge path injects DF_VERIFY_ROLE=merge => profile=both,
# exercising release-only tests (the 4055 sweep test, 4 large-DOF Euler tests,
# and the cfg(debug_assertions)-gated buckling/eigensolve tests in
# reify-solver-elastic) without slowing every per-task TDD iteration.
# hooks/pre-merge-commit pins --profile both explicitly for the local manual-merge
# gate (git merge on main) and is unchanged.
#
# DF_VERIFY_ROLE=merge also exempts the run from the held-slot test-run semaphore
# (scripts/lib_test_semaphore.sh test_semaphore_acquire L59) in addition to the
# psi_gate() bypass (scripts/verify.sh L173). The merge gate never waits behind
# a task slot. No dark-factory / orchestrator-code change is required for this
# (PRD docs/prds/test-run-concurrency-semaphore.md §6/§7): the orchestrator
# already injects DF_VERIFY_ROLE=merge on the queue merge path, and already
# requeues exit 75 (EX_TEMPFAIL) as retry-capped transient infra (same class as
# OCCT-slot/ENOSPC) — the semaphore reuses both pre-existing contracts verbatim.
test_command: "./scripts/verify.sh test --scope branch --include-infra"
lint_command: "./scripts/verify.sh lint --scope branch --include-infra"
# type_check_command is a passing no-op (task 4063).
# Rationale: lint_command's `cargo clippy --workspace --all-targets -- -D warnings` is a
# STRICT SUPERSET of `cargo check --workspace --tests` — clippy runs the full compiler
# frontend and reports every type error cargo check would, plus lint warnings. The
# orchestrator invokes test_command / lint_command / type_check_command as THREE SEPARATE
# verify.sh processes; verify.sh's own intra-process clippy-vs-cargo-check dedup (the
# DO_TYPECHECK && !DO_LINT guard at verify.sh:351) does NOT bridge across these separate
# invocations. So the standalone `verify.sh typecheck` pass was pure redundant compile
# (~20 min cargo check --workspace --tests) on every task iteration. No-op'd here.
#
# ACCEPTED COST: type errors now fail the LINT (clippy) phase rather than a distinct
# typecheck phase, so per-phase failure attribution loses the "type errors" bucket.
# Acceptable: clippy is the stricter signal and catches everything cargo check does.
# verify.sh's `typecheck` action remains a valid standalone/manual entry point unchanged.
type_check_command: "true"

# Run test/lint/type sequentially in one verify invocation.
# Rust workspaces take an advisory lock on target/.cargo-lock, so the three
# concurrent cargo subcommands serialize anyway — parallelism just wastes CPU.
concurrent_verify: false

# Env injected into verify subprocesses (merged on top of os.environ).
# sccache caches rustc output across worktrees; CARGO_INCREMENTAL=0 is required
# because incremental and sccache are mutually exclusive.
verify_env:
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  # Global jobserver: all concurrent cargo processes share 32 rustc tokens.
  # A solo task gets all 32 CPUs; N concurrent tasks split them ~32/N each.
  # The FIFO is managed by reify-jobserver.service (systemd --user).
  CARGO_MAKEFLAGS: "--jobserver-auth=fifo:/tmp/reify-jobserver"
  # Test-run semaphore knobs (REIFY_TEST_SEMAPHORE_*) are intentionally absent
  # here — they use safe defaults (N=1, WAIT=1800s; scripts/lib_test_semaphore.sh
  # L17-22). Add entries here only to tune; see docs/prds/test-run-concurrency-
  # semaphore.md §5 for the full knob contract.

# A′ coupling-tolerant merge train former — enabled per the s(N) go/no-go gate
# (reify esc-4455-16: GO at N=3; s(3)=0.962 ≫ 1/3, observed coupling-failure 0/104).
# Batches line-stackable merge-ready tasks into ONE full-scope merge verify to relieve
# the serial-queue backlog. Correctness is the same gate as single merges (the train tip
# is verified by verify.sh --scope all before advance). df tasks 1704-1708 landed the code.
merge_train_former_enabled: true
merge_train_max_members: 3  # already the default; explicit per GO-N3

# Per-role turn budgets. Raising the architect budget is a direct response to
# silent max_turns exits on large-scope tasks (e.g. reify 1749): the architect
# now has headroom to verify premises and produce a plan without the CLI
# truncating mid-tool-call.
max_turns:
  architect: 120

# Scheduler v2 — eager parks, cross-tier preemption, owner-state GC sweep.
# Burn-in cycle complete in dark-factory; flipping on here to exercise the
# new anti-starvation path against reify's larger task tree.
fairness:
  scheduler_v2: true

# ── Lever C (multi-host post-merge verify) — ENABLED 2026-06-10 ───────────────
# leo-laptop is a second verify host. Parity-proven 5/5 (dark-factory
# docs/verdict-parity-report.md, 2026-06-10); the operator enable path landed via
# df task 1716 (merge 26894cceec). Schema RECONCILED to the landed
# VerifyRunnerConfig + verify_drift_check_every_n_lands — the staged proposal's
# `drift_check_every_n_lands` key would have been silently dropped (extra='ignore').
# K = 1 + enabled runners = 2 (LocalRunner trust-anchor on the workstation +
# leo-laptop). Fail-safe: an unreachable laptop falls back to local, never stalls.
verify_runners:
  - name: laptop
    ssh_host: leo-laptop
    git_remote: leo-laptop            # remote in THIS repo -> laptop:/home/leo/src/reify
    config_path: /home/leo/.config/orchestrator/reify-laptop.yaml
    enabled: true
# Drift detector (ι): compare local vs remote verdict after every Nth land.
verify_drift_check_every_n_lands: 20
#
# sccache shared backend (κ): both hosts share a redis cache so the laptop free-rides
# the workstation's warm compilation artifacts. ENABLED 2026-06-10 alongside the C enable.
# Requires the workstation sccache server to be (re)started with this backend (the running
# server's backend is fixed at start). Correctness: sccache is input-hashed (caches
# compilation, not verdicts); the drift detector (every 20 lands) is the standing fidelity
# guarantee for this env change (the D6 parity was proven pre-sccache).
sccache:
  enabled: true
  backend_env:
    SCCACHE_REDIS: redis://leo-workstation.tailb08a6b.ts.net:6380
# ──────────────────────────────────────────────────────────────────────────────

# Trailing-24h spend ceiling. Default $200 was a backstop from before the
# multi-account failover landed — with Anthropic's per-account caps as the
# real spend governor, the orch-level dollar guard just trips during normal
# operation. Raised to effectively-disabled. The watcher ceiling
# (watcher_daily_cost_ceiling_usd, default $50) is left at its default for now.
orch_daily_cost_ceiling_usd: 10000.0

# Usage cap / multi-account failover
# 6 automation accounts (G→F→E→C→B→D); A reserved for interactive (eval runners
# inject A dynamically via USAGE_ACCOUNTS_FILE override). Authoritative pool list:
# config/usage-accounts.yaml.
# When one account hits its cap, UsageGate rotates to the next in list order.
usage_cap:
  enabled: true
  wait_for_reset: true
  probe_interval_secs: 300
  max_probe_interval_secs: 1800
  accounts_file: "${USAGE_ACCOUNTS_FILE:/home/leo/src/reify/config/usage-accounts.yaml}"

# Fused memory HTTP server (systemd service on port 8002)
fused_memory:
  url: "http://127.0.0.1:8002"
  project_id: "reify"
  server_command: []

# Sandbox (disabled — bwrap uid map broken on this kernel)
sandbox:
  enabled: false

# Escalation
escalation:
  queue_dir: "data/escalations"
  port: 8100

# Git
git:
  main_branch: "main"
  branch_prefix: "task/"
  remote: "origin"
  worktree_dir: ".worktrees"
  # Persistent warm merge-verify worktree (dark_factory:1692 = warmer-builds PRD κ).
  # Reuse a FIXED .worktrees/_merge-verify with target/ retained across the serial
  # (_MERGE_AHEAD_BOUND=1) merge-verify attempts → ~90→~25-35m typical, -60-80% CPU-s.
  # Activated 2026-06-10 (deb red-main-livelock follow-up). Trivially revertible (set false).
  persistent_merge_worktree: true
  # Off-lane detective (PRD §10 inv.6b): periodically re-verify a landed commit COLD and
  # compare test-level vs the warm result; divergence fires a born-at-L2 alarm naming the
  # commit + diverging tests. Cadence left at dark-factory defaults (every 40 lands OR nightly).
  warm_verify_shadow_compare: true
  # Main-gate sanction handshake (task 4367 step 1; dark_factory:1678 wired the
  # orchestrator side). advance_main runs main_gate_mark_command BEFORE its CAS
  # update-ref, so the reify reference-transaction hook records the orchestrator
  # merge worker's ~28 landings/day as `sanctioned` (not UNSANCTIONED) in
  # reify-main-gate.log. The sentinel path matches hooks/main-gate-lib.sh.
  # Enforcement stays OFF (warn-only) — this only populates the re-observe
  # window (4367 step 3); the durable ENFORCE flip is 4367 step 4.
  main_gate_mark_command: 'touch "$(git rev-parse --git-common-dir)/reify-main-gate-ok"'
  main_gate_unmark_command: 'rm -f "$(git rev-parse --git-common-dir)/reify-main-gate-ok"'

# Project root (absolute path)
project_root: "/home/leo/src/reify"
