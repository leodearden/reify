# Reify orchestrator configuration
# Rust + Tauri/TypeScript (GUI) project

# Concurrency
max_concurrent_tasks: 48
max_per_module: 1
lock_depth: 4
# Verification commands (Rust + GUI frontend)
# package-lock.json is committed — use npm ci for reproducible installs
# Commands use `cargo --workspace`; orchestrator's scope_cargo rewriter rewrites
# to `cargo -p <crate>` when all task files live in one crate. Do not pre-scope.
# Each potentially-long invocation is wrapped with `timeout --kill-after=60 <N>m`:
# SIGTERM at N minutes, then SIGKILL 60s later if it didn't exit. The --kill-after
# fallback is essential — a hung cargo process ignored SIGTERM for 10h on 2026-04-19.
# Budgets are generous (2-3x typical runtime) to tolerate cold caches and contention.
# OCCT-gated cargo test invocations delegate their timeout to the wrapper via
# REIFY_OCCT_TEST_TIMEOUT so the budget measures post-lock test runtime only —
# lock-wait time (up to REIFY_OCCT_LOCK_WAIT=1800s) does not consume the test budget.
# Cargo test uses a two-pass pattern (debug and release):
#   1. Gated pass: ./scripts/cargo-test-occt-gated.sh cargo test -p <occt-crates>
#      Acquires a cross-process flock so OCCT-touching crates serialize across
#      concurrent worktrees. Authoritative crate list: scripts/occt-touching-crates.txt
#      (drift-checked by tests/infra/test_occt_gated_scope.sh).
#   2. Ungated pass: timeout --kill-after=60 Nm cargo test --workspace --exclude <occt-crates>
#      Non-OCCT crates run concurrently across worktrees (no flock; no serialization).
#      Has its own outer timeout because it bypasses the wrapper.
# Other invocations (npm ci, sync_comments, infra/run_all) keep outer timeouts.
test_command: ". ~/.cargo/env && ./scripts/tree-sitter-generate.sh && REIFY_OCCT_TEST_TIMEOUT=2700 ./scripts/cargo-test-occt-gated.sh cargo test -p reify-kernel-occt -p reify-eval -p reify-cli -p reify-config -- --test-threads=1 && timeout --kill-after=60 30m cargo test --workspace --exclude reify-kernel-occt --exclude reify-eval --exclude reify-cli --exclude reify-config -- --test-threads=1 && REIFY_OCCT_TEST_TIMEOUT=3600 ./scripts/cargo-test-occt-gated.sh cargo test -p reify-kernel-occt -p reify-eval -p reify-cli -p reify-config --release -- --test-threads=1 && timeout --kill-after=60 45m cargo test --workspace --exclude reify-kernel-occt --exclude reify-eval --exclude reify-cli --exclude reify-config --release -- --test-threads=1 && if test -d gui; then (cd gui && timeout --kill-after=60 15m bash -c 'npm ci && npm test'); fi && if test -f gui/sidecar/package-lock.json; then (cd gui/sidecar && timeout --kill-after=60 10m npm ci); fi && if test -f tree-sitter-reify/package-lock.json; then (cd tree-sitter-reify && timeout --kill-after=60 10m npm ci); fi && if test -f tests/sync_comments_test.sh; then timeout --kill-after=60 10m bash tests/sync_comments_test.sh; else echo 'WARNING: sync_comments_test.sh not found, skipping'; fi && if test -f tests/infra/run_all.sh; then timeout --kill-after=60 20m bash tests/infra/run_all.sh; fi"
lint_command: ". ~/.cargo/env && ./scripts/tree-sitter-generate.sh && timeout --kill-after=60 30m cargo clippy --workspace -- -D warnings && if test -d gui; then (cd gui && timeout --kill-after=60 15m bash -c 'npm ci && npm run typecheck'); fi && if test -f gui/sidecar/package-lock.json; then (cd gui/sidecar && timeout --kill-after=60 10m bash -c 'npm ci && npm run typecheck && npm run typecheck:test'); fi && if test -f tree-sitter-reify/package-lock.json; then (cd tree-sitter-reify && timeout --kill-after=60 10m npm ci); fi && if test -f scripts/test_pm_standardization.sh; then timeout --kill-after=60 10m bash scripts/test_pm_standardization.sh; else echo 'WARNING: test_pm_standardization.sh not found, skipping'; fi && if test -f scripts/check_event_inventory.sh; then timeout --kill-after=60 5m bash scripts/check_event_inventory.sh; else echo 'WARNING: check_event_inventory.sh not found, skipping'; fi"
type_check_command: ". ~/.cargo/env && ./scripts/tree-sitter-generate.sh && timeout --kill-after=60 20m cargo check --workspace"

# Run test/lint/type sequentially in one verify invocation.
# Rust workspaces take an advisory lock on target/.cargo-lock, so the three
# concurrent cargo subcommands serialize anyway — parallelism just wastes CPU.
concurrent_verify: false

# Env injected into verify subprocesses (merged on top of os.environ).
# sccache caches rustc output across worktrees; CARGO_INCREMENTAL=0 is required
# because incremental and sccache are mutually exclusive.
verify_env:
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  # Global jobserver: all concurrent cargo processes share 32 rustc tokens.
  # A solo task gets all 32 CPUs; N concurrent tasks split them ~32/N each.
  # The FIFO is managed by reify-jobserver.service (systemd --user).
  CARGO_MAKEFLAGS: "--jobserver-auth=fifo:/tmp/reify-jobserver"

# Per-role turn budgets. Raising the architect budget is a direct response to
# silent max_turns exits on large-scope tasks (e.g. reify 1749): the architect
# now has headroom to verify premises and produce a plan without the CLI
# truncating mid-tool-call.
max_turns:
  architect: 120

# Scheduler v2 — eager parks, cross-tier preemption, owner-state GC sweep.
# Burn-in cycle complete in dark-factory; flipping on here to exercise the
# new anti-starvation path against reify's larger task tree.
fairness:
  scheduler_v2: true

# Trailing-24h spend ceiling. Default $200 was a backstop from before the
# multi-account failover landed — with Anthropic's per-account caps as the
# real spend governor, the orch-level dollar guard just trips during normal
# operation. Raised to effectively-disabled. The watcher ceiling
# (watcher_daily_cost_ceiling_usd, default $50) is left at its default for now.
orch_daily_cost_ceiling_usd: 10000.0

# Usage cap / multi-account failover
# 6 automation accounts (G→F→E→C→B→D); A reserved for interactive (eval runners
# inject A dynamically via USAGE_ACCOUNTS_FILE override). Authoritative pool list:
# config/usage-accounts.yaml.
# When one account hits its cap, UsageGate rotates to the next in list order.
usage_cap:
  enabled: true
  pause_threshold: 0.96
  wait_for_reset: true
  probe_interval_secs: 300
  max_probe_interval_secs: 1800
  accounts_file: "${USAGE_ACCOUNTS_FILE:/home/leo/src/reify/config/usage-accounts.yaml}"

# Fused memory HTTP server (systemd service on port 8002)
fused_memory:
  url: "http://127.0.0.1:8002"
  project_id: "reify"
  server_command: []

# Sandbox (disabled — bwrap uid map broken on this kernel)
sandbox:
  enabled: false

# Escalation
escalation:
  queue_dir: "data/escalations"
  port: 8100

# Git
git:
  main_branch: "main"
  branch_prefix: "task/"
  remote: "origin"
  worktree_dir: ".worktrees"

# Project root (absolute path)
project_root: "/home/leo/src/reify"
