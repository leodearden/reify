[package]
name = "reify-gui"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Tauri GUI backend for Reify: engine bridge, IPC types, and command handlers"

[[bin]]
name = "reify-gui"
path = "src/main.rs"
required-features = ["gui"]

[lib]
name = "reify_gui"
path = "src/lib.rs"

[features]
gui = ["dep:tauri", "dep:reify-kernel-occt"]

[dependencies]
reify-types.workspace = true
reify-syntax.workspace = true
reify-compiler.workspace = true
reify-eval.workspace = true
reify-constraints.workspace = true
reify-geometry.workspace = true
reify-kernel-occt = { workspace = true, optional = true }
reify-stdlib.workspace = true
tauri = { workspace = true, optional = true }
serde = { version = "1", features = ["derive"] }
serde_json.workspace = true

[dev-dependencies]
reify-test-support.workspace = true
