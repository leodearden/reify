[package]
name = "reify-gui"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Tauri GUI backend for Reify: engine bridge, IPC types, and command handlers"

[[bin]]
name = "reify-gui"
path = "src/main.rs"
required-features = ["gui"]

[lib]
name = "reify_gui"
path = "src/lib.rs"

[features]
gui = ["dep:tauri", "dep:reify-kernel-occt", "dep:tauri-plugin-dialog", "dep:tauri-plugin-shell"]

[dependencies]
reify-types.workspace = true
reify-syntax.workspace = true
reify-compiler.workspace = true
reify-eval.workspace = true
reify-constraints.workspace = true
reify-geometry.workspace = true
# OCCT bundling strategy: OCCT is dynamically linked via reify-kernel-occt's
# build.rs (dylib + rpath). For distribution, OCCT .so/.dylib/.dll files are
# listed in tauri.conf.json bundle.resources so they ship alongside the binary.
reify-kernel-occt = { workspace = true, optional = true }
reify-stdlib.workspace = true
reify-lsp.workspace = true
reify-mcp.workspace = true
tower-lsp.workspace = true
tauri = { workspace = true, optional = true }
tauri-plugin-dialog = { version = "2", optional = true }
tauri-plugin-shell = { version = "2", optional = true }
tokio = { workspace = true, features = ["process", "time"] }
axum = { version = "0.8", default-features = false, features = ["json", "tokio", "http1"] }
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
tracing.workspace = true
notify.workspace = true

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dev-dependencies]
reify-test-support.workspace = true
reify-eval = { workspace = true, features = ["test-instrumentation"] }
reify-mcp = { workspace = true, features = ["test-support"] }
reify-lsp = { workspace = true, features = ["test-support"] }
tempfile.workspace = true
