# cargo-nextest configuration for Reify.
#
# scripts/verify.sh runs the NON-OCCT workspace tail through nextest
# (`cargo nextest run --workspace --exclude <occt crates>`), which collapses
# the hundreds of per-binary `cargo test` processes into a single scheduler
# with one global thread pool.
#
# The OCCT-touching crates (reify-kernel-occt, reify-eval, reify-cli,
# reify-config — authoritative list: scripts/occt-touching-crates.txt) are
# EXCLUDED from that nextest pass and instead run via the cross-process flock
# wrapper (scripts/cargo-test-occt-gated.sh) as a plain `cargo test`. So the
# test-group below has NO effect on verification today: the ungated pass never
# includes these packages, and the gated pass does not use nextest.
#
# It is staged here for Stage 2 (task 3767, bounded multi-process OCCT
# concurrency): when OCCT tests move into the nextest pool, pinning them to a
# single-threaded test-group keeps intra-process OCCT execution serialized while
# the rest of the workspace runs at full concurrency.

[test-groups]
occt = { max-threads = 1 }

# Pin the OCCT-touching packages to the single-threaded `occt` group. Kept in
# sync with scripts/occt-touching-crates.txt by hand (these are config literals,
# not shell). A drift here is harmless today (the packages are excluded from the
# nextest pass) but must be revisited when Stage 2 folds them in.
[[profile.default.overrides]]
filter = 'package(reify-kernel-occt) | package(reify-eval) | package(reify-cli) | package(reify-config)'
test-group = 'occt'
