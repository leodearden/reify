[package]
name = "reify-kernel-gmsh"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Gmsh surface-to-volume tetrahedral mesher kernel adapter (v0.3 FEA pipeline)"

[dependencies]
reify-types.workspace = true
inventory.workspace = true
tracing.workspace = true

# `reify-eval` is a dev-dependency (not a normal dep) for the same reason the
# OCCT, Manifold, Fidget, and OpenVDB adapters exclude it from production deps:
# adapter crates depend on `reify-types` for the dependency-inverted
# `GeometryKernel` trait but deliberately NOT on `reify-eval` — keeping the
# adapter → eval dep direction inverted preserves the layering that lets
# `reify-eval` depend on adapter crates without a cycle. As a dev-dep,
# `reify-eval` is only pulled into the link closure of the
# `tests/dispatcher_integration.rs` test binary; the production library stays
# free of the eval dependency.
[dev-dependencies]
reify-eval.workspace = true
reify-test-support.workspace = true
